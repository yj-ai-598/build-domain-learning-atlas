.stage{position:relative;min-height:0;overflow:hidden}.stage canvas{width:100%;height:100%;display:block;touch-action:none}.stage-title{position:absolute;left:22px;top:20px;pointer-events:none}.stage-title small{color:#707a6c;font-size:9px;letter-spacing:.14em}.stage-title h1{max-width:48vw;margin:8px 0 0;font-size:clamp(20px,2.3vw,32px);line-height:1.15;letter-spacing:-.03em}

<script>
const CORPUS=[{"id":"0","file":"01-domain-overview.md","title":"健身领域全景与学习架构","color":"#b8ff4f","markdown":"# 健身领域全景与学习架构\n\n> 目标：建立一个安全、可持续、能自我迭代的健身系统。本知识库面向健康成年人做通识学习，不替代医生、物理治疗师或注册营养师的个体化建议。\n\n## 1. 健身到底在解决什么\n\n健身不是单一的“减重”或“练大”，而是主动管理身体适应。训练提供刺激，营养和睡眠提供恢复条件，长期行为决定结果能否积累。\n\n### 1.1 五类常见目标\n\n| 目标 | 主要结果 | 常用指标 | 常见误区 |\n|---|---|---|---|\n| 健康 | 心肺、肌力、代谢与功能 | 每周活动量、静息心率、日常精力 | 只看体重 |\n| 增肌 | 肌肉横截面积与围度 | 训练表现、围度、照片 | 每次都练到力竭 |\n| 减脂 | 降低脂肪同时保留功能 | 体重趋势、腰围、力量 | 极端节食 |\n| 力量 | 提高特定动作输出 | 训练重量、次数、动作质量 | 只测试不训练 |\n| 运动表现 | 速度、耐力、爆发与专项能力 | 专项测试 | 照搬健美计划 |\n\n### 1.2 适应循环\n\n**刺激 → 疲劳 → 恢复 → 超量适应 → 新刺激**。训练计划的任务不是制造最大疲劳，而是安排“可恢复的有效刺激”。\n\n#### 1.2.1 最小有效剂量\n\n从能稳定执行的较小训练量开始。2026 年 ACSM 阻力训练立场更新强调：从完全不练到规律进行任何形式的阻力训练，往往是最有意义的一步；一致性通常比复杂性重要。\n\n#### 1.2.2 可恢复上限\n\n训练量继续增加时，收益会逐渐变小，疲劳和伤病风险会上升。睡眠、压力、饮食与训练经验都会改变个人上限。\n\n## 2. 健身能力地图\n\n能力地图把“健身”拆成身体能力、计划能力和行为能力。这样做是为了避免只训练身体，却没有建立安排、判断和长期执行的能力。\n\n### 2.1 身体能力\n\n- **力量**：对抗阻力的能力。\n- **肌肥大**：肌肉组织随训练产生的增长。\n- **心肺耐力**：持续供能和利用氧气的能力。\n- **活动度**：关节在控制下达到动作范围的能力。\n- **协调与技能**：在目标动作中组织身体的能力。\n\n### 2.2 计划能力\n\n- 把目标翻译为训练变量。\n- 根据日程与器械约束做取舍。\n- 记录训练并识别趋势。\n- 在停滞、疼痛或疲劳时调整。\n\n### 2.3 行为能力\n\n真正稀缺的能力是让训练进入生活，而不是让生活长期迁就一个脆弱的完美计划。\n\n## 3. 学习顺序\n\n学习顺序遵循“先安全与稳定，再渐进与专项”的逻辑。每一阶段都以前一阶段能够稳定执行为前提，而不是按固定日期强行升级。\n\n### 3.1 第一阶段：安全起步\n\n先理解疼痛红旗、动作模式、强度感知和基本训练结构，建立每周两次全身训练的习惯。\n\n### 3.2 第二阶段：稳定进步\n\n学习渐进超负荷、训练量管理、饮食结构、睡眠与记录方法。\n\n### 3.3 第三阶段：目标专项化\n\n围绕增肌、减脂、力量或跑步表现调整动作、周结构和评估指标。\n\n## 4. 使用边界与安全\n\n安全边界用于区分一般训练调整与需要专业介入的情况。健身知识可以帮助管理常见负荷，却不能替代对疾病、创伤和复杂疼痛的诊断。\n\n### 4.1 需要先咨询专业人士的情况\n\n- 胸痛、晕厥、异常呼吸困难或已知心血管问题。\n- 新发严重疼痛、明显肿胀、麻木、肌力突然下降。\n- 近期手术、骨折、妊娠或复杂慢性病。\n- 进食障碍史或明显的体重与身体形象困扰。\n\n### 4.2 疼痛不是单一信号\n\n疼痛受组织、负荷、睡眠、压力和预期影响。不能仅凭“哪里疼”在线诊断；持续或加重的疼痛应由合格临床专业人士评估。\n","nodes":[{"id":"0-0","level":1,"title":"健身领域全景与学习架构","line":1,"parent":null,"children":["0-1","0-6","0-10","0-14"],"body":"> 目标：建立一个安全、可持续、能自我迭代的健身系统。本知识库面向健康成年人做通识学习，不替代医生、物理治疗师或注册营养师的个体化建议。"},{"id":"0-1","level":2,"title":"1. 健身到底在解决什么","line":5,"parent":"0-0","children":["0-2","0-3"],"body":"健身不是单一的“减重”或“练大”，而是主动管理身体适应。训练提供刺激，营养和睡眠提供恢复条件，长期行为决定结果能否积累。"},{"id":"0-2","level":3,"title":"1.1 五类常见目标","line":9,"parent":"0-1","children":[],"body":"| 目标 | 主要结果 | 常用指标 | 常见误区 |\n|---|---|---|---|\n| 健康 | 心肺、肌力、代谢与功能 | 每周活动量、静息心率、日常精力 | 只看体重 |\n| 增肌 | 肌肉横截面积与围度 | 训练表现、围度、照片 | 每次都练到力竭 |\n| 减脂 | 降低脂肪同时保留功能 | 体重趋势、腰围、力量 | 极端节食 |\n| 力量 | 提高特定动作输出 | 训练重量、次数、动作质量 | 只测试不训练 |\n| 运动表现 | 速度、耐力、爆发与专项能力 | 专项测试 | 照搬健美计划 |"},{"id":"0-3","level":3,"title":"1.2 适应循环","line":19,"parent":"0-1","children":["0-4","0-5"],"body":"**刺激 → 疲劳 → 恢复 → 超量适应 → 新刺激**。训练计划的任务不是制造最大疲劳，而是安排“可恢复的有效刺激”。"},{"id":"0-4","level":4,"title":"1.2.1 最小有效剂量","line":23,"parent":"0-3","children":[],"body":"从能稳定执行的较小训练量开始。2026 年 ACSM 阻力训练立场更新强调：从完全不练到规律进行任何形式的阻力训练，往往是最有意义的一步；一致性通常比复杂性重要。"},{"id":"0-5","level":4,"title":"1.2.2 可恢复上限","line":27,"parent":"0-3","children":[],"body":"训练量继续增加时，收益会逐渐变小，疲劳和伤病风险会上升。睡眠、压力、饮食与训练经验都会改变个人上限。"},{"id":"0-6","level":2,"title":"2. 健身能力地图","line":31,"parent":"0-0","children":["0-7","0-8","0-9"],"body":"能力地图把“健身”拆成身体能力、计划能力和行为能力。这样做是为了避免只训练身体，却没有建立安排、判断和长期执行的能力。"},{"id":"0-7","level":3,"title":"2.1 身体能力","line":35,"parent":"0-6","children":[],"body":"- **力量**：对抗阻力的能力。\n- **肌肥大**：肌肉组织随训练产生的增长。\n- **心肺耐力**：持续供能和利用氧气的能力。\n- **活动度**：关节在控制下达到动作范围的能力。\n- **协调与技能**：在目标动作中组织身体的能力。"},{"id":"0-8","level":3,"title":"2.2 计划能力","line":43,"parent":"0-6","children":[],"body":"- 把目标翻译为训练变量。\n- 根据日程与器械约束做取舍。\n- 记录训练并识别趋势。\n- 在停滞、疼痛或疲劳时调整。"},{"id":"0-9","level":3,"title":"2.3 行为能力","line":50,"parent":"0-6","children":[],"body":"真正稀缺的能力是让训练进入生活，而不是让生活长期迁就一个脆弱的完美计划。"},{"id":"0-10","level":2,"title":"3. 学习顺序","line":54,"parent":"0-0","children":["0-11","0-12","0-13"],"body":"学习顺序遵循“先安全与稳定，再渐进与专项”的逻辑。每一阶段都以前一阶段能够稳定执行为前提，而不是按固定日期强行升级。"},{"id":"0-11","level":3,"title":"3.1 第一阶段：安全起步","line":58,"parent":"0-10","children":[],"body":"先理解疼痛红旗、动作模式、强度感知和基本训练结构，建立每周两次全身训练的习惯。"},{"id":"0-12","level":3,"title":"3.2 第二阶段：稳定进步","line":62,"parent":"0-10","children":[],"body":"学习渐进超负荷、训练量管理、饮食结构、睡眠与记录方法。"},{"id":"0-13","level":3,"title":"3.3 第三阶段：目标专项化","line":66,"parent":"0-10","children":[],"body":"围绕增肌、减脂、力量或跑步表现调整动作、周结构和评估指标。"},{"id":"0-14","level":2,"title":"4. 使用边界与安全","line":70,"parent":"0-0","children":["0-15","0-16"],"body":"安全边界用于区分一般训练调整与需要专业介入的情况。健身知识可以帮助管理常见负荷，却不能替代对疾病、创伤和复杂疼痛的诊断。"},{"id":"0-15","level":3,"title":"4.1 需要先咨询专业人士的情况","line":74,"parent":"0-14","children":[],"body":"- 胸痛、晕厥、异常呼吸困难或已知心血管问题。\n- 新发严重疼痛、明显肿胀、麻木、肌力突然下降。\n- 近期手术、骨折、妊娠或复杂慢性病。\n- 进食障碍史或明显的体重与身体形象困扰。"},{"id":"0-16","level":3,"title":"4.2 疼痛不是单一信号","line":81,"parent":"0-14","children":[],"body":"疼痛受组织、负荷、睡眠、压力和预期影响。不能仅凭“哪里疼”在线诊断；持续或加重的疼痛应由合格临床专业人士评估。"}]},{"id":"1","file":"02-terms-models.md","title":"健身核心术语与心智模型","color":"#55e7ff","markdown":"# 健身核心术语与心智模型\n\n这份文档建立阅读训练计划、记录训练和判断进步所需的共同语言。先理解概念之间的关系，再学习每个变量的操作细节，可以避免只记住零散数字。\n\n## 1. 训练处方的构成\n\n训练处方是把目标转化为可执行刺激的设计过程。本章先解释“哪些旋钮可以调整”，再分别展开每个旋钮的含义、作用和记录方法。\n\n### 1.1 训练变量\n\n**训练变量**是用来描述和调节训练刺激的一组可控参数。它们共同回答：做什么、做多少、做多难、多久做一次，以及怎样完成。只改单个变量而忽略其他变量，常会错误判断训练负荷。\n\n| 5W1H | 在训练变量中的问题 | 为什么重要 |\n|---|---|---|\n| What | 做什么动作、多少组与次数 | 决定刺激对象和基本剂量 |\n| Why | 为健康、增肌、力量还是技能服务 | 决定变量取舍标准 |\n| Who | 训练者的经验、能力与恢复条件 | 决定起点与可承受范围 |\n| When | 每周频率、动作顺序与训练周期 | 决定刺激如何分布 |\n| Where | 家庭、健身房或专项场地 | 决定器械与动作选择 |\n| How | 负荷、RIR、节奏与动作范围 | 决定每组刺激怎样产生 |\n\n考虑训练变量的目的，不是把计划变复杂，而是让计划**可描述、可执行、可比较、可调整**。当进步或停滞发生时，这套语言能帮助我们知道究竟改变了什么。\n\n#### 1.1.1 动作选择\n\n动作选择决定主要训练的动作模式、肌群和技能。应根据目标、器械、动作耐受和个人偏好选择，而不是依据动作是否“高级”。\n\n#### 1.1.2 次数\n\n**次数（Rep）**是一次完整动作。次数区间会影响负荷选择、单组持续时间和技术难度；记录次数时必须保持动作标准大致一致。\n\n#### 1.1.3 组数\n\n**组（Set）**是一段连续完成的次数。工作组用于产生主要刺激，热身组用于逐步接近工作状态，两者不应混为一谈。\n\n#### 1.1.4 负荷\n\n**负荷（Load）**是外部重量或阻力。负荷越高通常不等于效果越好，它必须与次数、余力、动作范围和技术质量共同解释。\n\n#### 1.1.5 训练量\n\n**训练量（Volume）**描述一段时间内完成的工作总量。重量×次数×组数是常见估算，但不能完整表示动作难度、有效范围和接近力竭程度。\n\n#### 1.1.6 强度与努力程度\n\n强度可以指相对于最大能力的负荷，也可以指主观努力程度。实践中应明确使用的是百分比、RPE、RIR，还是心率区间。\n\n#### 1.1.7 频率\n\n**频率（Frequency）**表示每周训练某动作、肌群或能力的次数。频率主要帮助分配训练量、练习技能和管理单次疲劳。\n\n#### 1.1.8 休息时间\n\n组间休息决定下一组能恢复多少输出能力。大动作和高强度组通常需要更长休息；短休息并不自动意味着训练更有效。\n\n#### 1.1.9 节奏与动作范围\n\n节奏描述离心、停顿、向心等阶段；动作范围描述关节和器械移动区间。两者应服务目标，并保持可控制和可重复。\n\n### 1.2 RPE 与 RIR\n\nRPE 与 RIR 是把主观努力程度转化为可记录信息的方法。它们适合调节每日状态，但依赖训练者对动作标准和自身能力的判断。\n\n#### 1.2.1 RIR 的含义\n\n**RIR（Reps in Reserve）**表示一组结束时估计还能完成多少次标准动作。RIR 2 意味着大约还能完成 2 次，而不是还能用明显变形再挤出 2 次。\n\n#### 1.2.2 RPE 的含义\n\n力量训练中常用 1–10 表示 RPE。RPE 10 约等于没有余力，RPE 8 约等于 RIR 2；不同运动中的 RPE 量表含义可能不同。\n\n#### 1.2.3 初学者使用法\n\n大多数工作组可先停在 RIR 2–4。动作稳定、估计能力提高后，再让少量训练组接近 RIR 0–2，并观察恢复。\n\n## 2. 适应与进步模型\n\n适应模型解释身体为什么会随训练改变，以及为什么同一套计划不会永远有效。核心不是不断追求更累，而是逐步提供与目标一致、又能恢复的刺激。\n\n### 2.1 渐进超负荷\n\n渐进超负荷是让训练需求随能力提升而逐步提高。它描述长期趋势，不要求每次训练都增加重量。\n\n#### 2.1.1 可用的渐进方式\n\n- 增加负荷或标准次数。\n- 增加高质量工作组。\n- 改善动作范围、控制或技术。\n- 在同样工作下减少主观用力。\n\n#### 2.1.2 不能算作稳定进步的情况\n\n如果增加数字依赖缩短动作范围、明显借力或改变器械设置，那么新旧记录可能不可直接比较。\n\n### 2.2 特异性\n\n特异性表示身体会优先适应反复练习的任务。它帮助训练者在“广泛健康”和“专项表现”之间安排优先级。\n\n#### 2.2.1 动作特异性\n\n想提高深蹲力量，需要保留与深蹲相近的动作、负荷和技术练习；替代动作可以辅助，但不能完全等价。\n\n#### 2.2.2 能量系统特异性\n\n长时间耐力、短时冲刺和最大力量依赖不同的主要供能与技能需求，训练结构应与目标持续时间和强度相匹配。\n\n### 2.3 个体差异\n\n个体差异解释相同计划为什么会产生不同结果。训练年龄、身体结构、恢复资源、偏好和生活压力都会改变适合的起点与进展速度。\n\n#### 2.3.1 计划是初始假设\n\n计划不是保证结果的处方，而是一个可测试的初始方案。记录与反馈用于逐渐校准个人有效范围。\n\n#### 2.3.2 不把差异神秘化\n\n承认个体差异不等于拒绝通用原则。先使用可靠原则建立起点，再根据持续数据做有限调整。\n\n## 3. 疲劳与恢复模型\n\n疲劳是训练刺激带来的短期成本，恢复是重新获得能力并产生适应的过程。判断训练质量时，需要同时看刺激是否足够和成本是否可承受。\n\n### 3.1 急性疲劳\n\n急性疲劳包括训练后的局部乏力、短期表现下降和延迟性肌肉酸痛。它提示身体经历了负荷，但酸痛程度不能直接衡量训练效果。\n\n#### 3.1.1 正常波动\n\n单日状态会受睡眠、饮食、压力、环境和动作熟悉度影响。一次表现下降通常不足以证明计划失效。\n\n#### 3.1.2 需要关注的组合信号\n\n多项动作持续退步、睡眠恶化、训练意愿显著下降和日常功能受影响同时出现时，才更值得系统检查总负荷。\n\n### 3.2 超量与过度训练\n\n超量描述一段高负荷后出现的表现下降。应区分可快速恢复的功能性超量、恢复周期更长的非功能性超量，以及罕见且需专业评估的过度训练综合征。\n\n#### 3.2.1 功能性超量\n\n短期提高负荷后安排充分恢复，表现随后回升。这种策略更适合有经验且能监测恢复的训练者。\n\n#### 3.2.2 非功能性超量\n\n疲劳持续过久且没有带来额外收益，通常说明负荷、恢复或生活压力之间失衡。\n\n### 3.3 Deload 减量\n\n减量是在保留训练节奏的同时，暂时减少组数、负荷或接近力竭程度。它是疲劳管理工具，不是固定日历仪式。\n\n#### 3.3.1 何时考虑\n\n当多项疲劳信号持续出现、计划阶段结束，或比赛测试前需要降低疲劳时，可以考虑减量。\n\n#### 3.3.2 怎样执行\n\n优先减少总组数和高疲劳工作，保留熟悉动作与适度强度，随后依据状态逐步恢复正常训练。\n\n## 4. 身体组成模型\n\n身体组成模型用于理解体重、脂肪和肌肉变化。它提供趋势判断框架，但不能把健康压缩成单个体重或体脂数字。\n\n### 4.1 能量平衡\n\n长期体重趋势受能量摄入与消耗影响。能量平衡适合解释方向，不适合精确预测每一天的体重。\n\n#### 4.1.1 短期体重扰动\n\n水分、糖原、盐分、消化内容物和月经周期都能造成明显波动，因此应观察多日平均和较长趋势。\n\n#### 4.1.2 能量缺口与盈余\n\n减脂通常需要可持续缺口，增肌需要足够能量支持。缺口或盈余的幅度应结合训练表现、恢复和目标速度调整。\n\n### 4.2 多维评估\n\n多维评估把体重与围度、训练表现、照片、日常功能和主观状态结合，降低单个指标误导决策的风险。\n\n#### 4.2.1 可比较条件\n\n测量时间、器械、姿势和动作标准应尽量一致。条件变化时，要在日志中注明，避免制造虚假的趋势。\n\n#### 4.2.2 健康不是单一外观\n\n体重或外观无法独立说明心肺、肌力、睡眠、饮食行为和心理状态。评估必须回到最初目标。\n","nodes":[{"id":"1-0","level":1,"title":"健身核心术语与心智模型","line":1,"parent":null,"children":["1-1","1-16","1-26","1-36"],"body":"这份文档建立阅读训练计划、记录训练和判断进步所需的共同语言。先理解概念之间的关系，再学习每个变量的操作细节，可以避免只记住零散数字。"},{"id":"1-1","level":2,"title":"1. 训练处方的构成","line":5,"parent":"1-0","children":["1-2","1-12"],"body":"训练处方是把目标转化为可执行刺激的设计过程。本章先解释“哪些旋钮可以调整”，再分别展开每个旋钮的含义、作用和记录方法。"},{"id":"1-2","level":3,"title":"1.1 训练变量","line":9,"parent":"1-1","children":["1-3","1-4","1-5","1-6","1-7","1-8","1-9","1-10","1-11"],"body":"**训练变量**是用来描述和调节训练刺激的一组可控参数。它们共同回答：做什么、做多少、做多难、多久做一次，以及怎样完成。只改单个变量而忽略其他变量，常会错误判断训练负荷。\n\n| 5W1H | 在训练变量中的问题 | 为什么重要 |\n|---|---|---|\n| What | 做什么动作、多少组与次数 | 决定刺激对象和基本剂量 |\n| Why | 为健康、增肌、力量还是技能服务 | 决定变量取舍标准 |\n| Who | 训练者的经验、能力与恢复条件 | 决定起点与可承受范围 |\n| When | 每周频率、动作顺序与训练周期 | 决定刺激如何分布 |\n| Where | 家庭、健身房或专项场地 | 决定器械与动作选择 |\n| How | 负荷、RIR、节奏与动作范围 | 决定每组刺激怎样产生 |\n\n考虑训练变量的目的，不是把计划变复杂，而是让计划**可描述、可执行、可比较、可调整**。当进步或停滞发生时，这套语言能帮助我们知道究竟改变了什么。"},{"id":"1-3","level":4,"title":"1.1.1 动作选择","line":24,"parent":"1-2","children":[],"body":"动作选择决定主要训练的动作模式、肌群和技能。应根据目标、器械、动作耐受和个人偏好选择，而不是依据动作是否“高级”。"},{"id":"1-4","level":4,"title":"1.1.2 次数","line":28,"parent":"1-2","children":[],"body":"**次数（Rep）**是一次完整动作。次数区间会影响负荷选择、单组持续时间和技术难度；记录次数时必须保持动作标准大致一致。"},{"id":"1-5","level":4,"title":"1.1.3 组数","line":32,"parent":"1-2","children":[],"body":"**组（Set）**是一段连续完成的次数。工作组用于产生主要刺激，热身组用于逐步接近工作状态，两者不应混为一谈。"},{"id":"1-6","level":4,"title":"1.1.4 负荷","line":36,"parent":"1-2","children":[],"body":"**负荷（Load）**是外部重量或阻力。负荷越高通常不等于效果越好，它必须与次数、余力、动作范围和技术质量共同解释。"},{"id":"1-7","level":4,"title":"1.1.5 训练量","line":40,"parent":"1-2","children":[],"body":"**训练量（Volume）**描述一段时间内完成的工作总量。重量×次数×组数是常见估算，但不能完整表示动作难度、有效范围和接近力竭程度。"},{"id":"1-8","level":4,"title":"1.1.6 强度与努力程度","line":44,"parent":"1-2","children":[],"body":"强度可以指相对于最大能力的负荷，也可以指主观努力程度。实践中应明确使用的是百分比、RPE、RIR，还是心率区间。"},{"id":"1-9","level":4,"title":"1.1.7 频率","line":48,"parent":"1-2","children":[],"body":"**频率（Frequency）**表示每周训练某动作、肌群或能力的次数。频率主要帮助分配训练量、练习技能和管理单次疲劳。"},{"id":"1-10","level":4,"title":"1.1.8 休息时间","line":52,"parent":"1-2","children":[],"body":"组间休息决定下一组能恢复多少输出能力。大动作和高强度组通常需要更长休息；短休息并不自动意味着训练更有效。"},{"id":"1-11","level":4,"title":"1.1.9 节奏与动作范围","line":56,"parent":"1-2","children":[],"body":"节奏描述离心、停顿、向心等阶段；动作范围描述关节和器械移动区间。两者应服务目标，并保持可控制和可重复。"},{"id":"1-12","level":3,"title":"1.2 RPE 与 RIR","line":60,"parent":"1-1","children":["1-13","1-14","1-15"],"body":"RPE 与 RIR 是把主观努力程度转化为可记录信息的方法。它们适合调节每日状态，但依赖训练者对动作标准和自身能力的判断。"},{"id":"1-13","level":4,"title":"1.2.1 RIR 的含义","line":64,"parent":"1-12","children":[],"body":"**RIR（Reps in Reserve）**表示一组结束时估计还能完成多少次标准动作。RIR 2 意味着大约还能完成 2 次，而不是还能用明显变形再挤出 2 次。"},{"id":"1-14","level":4,"title":"1.2.2 RPE 的含义","line":68,"parent":"1-12","children":[],"body":"力量训练中常用 1–10 表示 RPE。RPE 10 约等于没有余力，RPE 8 约等于 RIR 2；不同运动中的 RPE 量表含义可能不同。"},{"id":"1-15","level":4,"title":"1.2.3 初学者使用法","line":72,"parent":"1-12","children":[],"body":"大多数工作组可先停在 RIR 2–4。动作稳定、估计能力提高后，再让少量训练组接近 RIR 0–2，并观察恢复。"},{"id":"1-16","level":2,"title":"2. 适应与进步模型","line":76,"parent":"1-0","children":["1-17","1-20","1-23"],"body":"适应模型解释身体为什么会随训练改变，以及为什么同一套计划不会永远有效。核心不是不断追求更累，而是逐步提供与目标一致、又能恢复的刺激。"},{"id":"1-17","level":3,"title":"2.1 渐进超负荷","line":80,"parent":"1-16","children":["1-18","1-19"],"body":"渐进超负荷是让训练需求随能力提升而逐步提高。它描述长期趋势，不要求每次训练都增加重量。"},{"id":"1-18","level":4,"title":"2.1.1 可用的渐进方式","line":84,"parent":"1-17","children":[],"body":"- 增加负荷或标准次数。\n- 增加高质量工作组。\n- 改善动作范围、控制或技术。\n- 在同样工作下减少主观用力。"},{"id":"1-19","level":4,"title":"2.1.2 不能算作稳定进步的情况","line":91,"parent":"1-17","children":[],"body":"如果增加数字依赖缩短动作范围、明显借力或改变器械设置，那么新旧记录可能不可直接比较。"},{"id":"1-20","level":3,"title":"2.2 特异性","line":95,"parent":"1-16","children":["1-21","1-22"],"body":"特异性表示身体会优先适应反复练习的任务。它帮助训练者在“广泛健康”和“专项表现”之间安排优先级。"},{"id":"1-21","level":4,"title":"2.2.1 动作特异性","line":99,"parent":"1-20","children":[],"body":"想提高深蹲力量，需要保留与深蹲相近的动作、负荷和技术练习；替代动作可以辅助，但不能完全等价。"},{"id":"1-22","level":4,"title":"2.2.2 能量系统特异性","line":103,"parent":"1-20","children":[],"body":"长时间耐力、短时冲刺和最大力量依赖不同的主要供能与技能需求，训练结构应与目标持续时间和强度相匹配。"},{"id":"1-23","level":3,"title":"2.3 个体差异","line":107,"parent":"1-16","children":["1-24","1-25"],"body":"个体差异解释相同计划为什么会产生不同结果。训练年龄、身体结构、恢复资源、偏好和生活压力都会改变适合的起点与进展速度。"},{"id":"1-24","level":4,"title":"2.3.1 计划是初始假设","line":111,"parent":"1-23","children":[],"body":"计划不是保证结果的处方，而是一个可测试的初始方案。记录与反馈用于逐渐校准个人有效范围。"},{"id":"1-25","level":4,"title":"2.3.2 不把差异神秘化","line":115,"parent":"1-23","children":[],"body":"承认个体差异不等于拒绝通用原则。先使用可靠原则建立起点，再根据持续数据做有限调整。"},{"id":"1-26","level":2,"title":"3. 疲劳与恢复模型","line":119,"parent":"1-0","children":["1-27","1-30","1-33"],"body":"疲劳是训练刺激带来的短期成本，恢复是重新获得能力并产生适应的过程。判断训练质量时，需要同时看刺激是否足够和成本是否可承受。"},{"id":"1-27","level":3,"title":"3.1 急性疲劳","line":123,"parent":"1-26","children":["1-28","1-29"],"body":"急性疲劳包括训练后的局部乏力、短期表现下降和延迟性肌肉酸痛。它提示身体经历了负荷，但酸痛程度不能直接衡量训练效果。"},{"id":"1-28","level":4,"title":"3.1.1 正常波动","line":127,"parent":"1-27","children":[],"body":"单日状态会受睡眠、饮食、压力、环境和动作熟悉度影响。一次表现下降通常不足以证明计划失效。"},{"id":"1-29","level":4,"title":"3.1.2 需要关注的组合信号","line":131,"parent":"1-27","children":[],"body":"多项动作持续退步、睡眠恶化、训练意愿显著下降和日常功能受影响同时出现时，才更值得系统检查总负荷。"},{"id":"1-30","level":3,"title":"3.2 超量与过度训练","line":135,"parent":"1-26","children":["1-31","1-32"],"body":"超量描述一段高负荷后出现的表现下降。应区分可快速恢复的功能性超量、恢复周期更长的非功能性超量，以及罕见且需专业评估的过度训练综合征。"},{"id":"1-31","level":4,"title":"3.2.1 功能性超量","line":139,"parent":"1-30","children":[],"body":"短期提高负荷后安排充分恢复，表现随后回升。这种策略更适合有经验且能监测恢复的训练者。"},{"id":"1-32","level":4,"title":"3.2.2 非功能性超量","line":143,"parent":"1-30","children":[],"body":"疲劳持续过久且没有带来额外收益，通常说明负荷、恢复或生活压力之间失衡。"},{"id":"1-33","level":3,"title":"3.3 Deload 减量","line":147,"parent":"1-26","children":["1-34","1-35"],"body":"减量是在保留训练节奏的同时，暂时减少组数、负荷或接近力竭程度。它是疲劳管理工具，不是固定日历仪式。"},{"id":"1-34","level":4,"title":"3.3.1 何时考虑","line":151,"parent":"1-33","children":[],"body":"当多项疲劳信号持续出现、计划阶段结束，或比赛测试前需要降低疲劳时，可以考虑减量。"},{"id":"1-35","level":4,"title":"3.3.2 怎样执行","line":155,"parent":"1-33","children":[],"body":"优先减少总组数和高疲劳工作，保留熟悉动作与适度强度，随后依据状态逐步恢复正常训练。"},{"id":"1-36","level":2,"title":"4. 身体组成模型","line":159,"parent":"1-0","children":["1-37","1-40"],"body":"身体组成模型用于理解体重、脂肪和肌肉变化。它提供趋势判断框架，但不能把健康压缩成单个体重或体脂数字。"},{"id":"1-37","level":3,"title":"4.1 能量平衡","line":163,"parent":"1-36","children":["1-38","1-39"],"body":"长期体重趋势受能量摄入与消耗影响。能量平衡适合解释方向，不适合精确预测每一天的体重。"},{"id":"1-38","level":4,"title":"4.1.1 短期体重扰动","line":167,"parent":"1-37","children":[],"body":"水分、糖原、盐分、消化内容物和月经周期都能造成明显波动，因此应观察多日平均和较长趋势。"},{"id":"1-39","level":4,"title":"4.1.2 能量缺口与盈余","line":171,"parent":"1-37","children":[],"body":"减脂通常需要可持续缺口，增肌需要足够能量支持。缺口或盈余的幅度应结合训练表现、恢复和目标速度调整。"},{"id":"1-40","level":3,"title":"4.2 多维评估","line":175,"parent":"1-36","children":["1-41","1-42"],"body":"多维评估把体重与围度、训练表现、照片、日常功能和主观状态结合，降低单个指标误导决策的风险。"},{"id":"1-41","level":4,"title":"4.2.1 可比较条件","line":179,"parent":"1-40","children":[],"body":"测量时间、器械、姿势和动作标准应尽量一致。条件变化时，要在日志中注明，避免制造虚假的趋势。"},{"id":"1-42","level":4,"title":"4.2.2 健康不是单一外观","line":183,"parent":"1-40","children":[],"body":"体重或外观无法独立说明心肺、肌力、睡眠、饮食行为和心理状态。评估必须回到最初目标。"}]},{"id":"2","file":"03-training-workflow.md","title":"训练计划工作流","color":"#ffb84d","markdown":"# 训练计划工作流\n\n这份文档说明如何把模糊愿望转化为可执行、可记录和可复盘的训练计划。工作流从目标与约束开始，经过周结构和单次训练设计，最后进入渐进与复盘。\n\n## 1. 从目标到约束\n\n目标定义“为什么练”和“怎样算进步”，约束定义现实中“能怎样练”。先处理这两者，可以减少计划看似专业却无法执行的问题。\n\n### 1.1 写出目标\n\n一个可执行目标需要说明：想改变什么、用什么指标观察、愿意投入多少时间、计划持续多久。\n\n```text\n我的主要目标：\n当前水平与最近训练经历：\n每周可训练天数与单次时长：\n可用器械：\n旧伤、疼痛或医疗限制：\n偏好的训练形式：\n12 周后希望看到的可观察变化：\n```\n\n### 1.2 盘点约束\n\n- 时间约束：每周频率、通勤、睡眠。\n- 环境约束：家庭、商业健身房、户外。\n- 身体约束：动作耐受、既往伤病、恢复速度。\n- 心理约束：喜欢什么、害怕什么、能否长期执行。\n\n## 2. 选择周结构\n\n周结构用于把训练刺激分配到日历中。选择依据是可用天数、单次时长、恢复和目标优先级，而不是训练水平对应某种固定分化。\n\n### 2.1 两天全身\n\n适合新手或时间紧张者。每次覆盖蹲、髋、推、拉、核心与携带中的主要模式。\n\n### 2.2 三天全身\n\n用 A/B/C 三个训练日分散训练量，既能提高练习频率，也能控制单次时长。\n\n### 2.3 上下肢四天\n\n适合已有稳定训练习惯、希望增加训练量的人。不是“更高级”的必经路线。\n\n## 3. 设计单次训练\n\n单次训练设计把周目标翻译成当天的动作顺序、工作组和休息安排。核心是保护重点动作质量，并让总时长和疲劳保持可控。\n\n### 3.1 热身\n\n热身的目的包括提高体温、熟悉当日动作、逐步接近工作负荷。通常无需把热身变成另一套完整训练。\n\n### 3.2 动作排序\n\n1. 技术要求高或最重要的动作。\n2. 大肌群复合动作。\n3. 辅助与孤立动作。\n4. 低风险体能或核心收尾。\n\n### 3.3 工作组处方\n\n初学者可以从每个主要动作 2–3 个工作组开始，多数组保留 2–4 次余力。先稳定动作与出勤，再增加复杂度。\n\n## 4. 渐进与调整\n\n渐进与调整决定计划怎样随能力和状态变化。先设定简单规则，再根据连续数据行动，可以避免每天凭感觉重写计划。\n\n### 4.1 双重渐进\n\n设定次数区间，例如 8–12 次。当所有工作组都能以目标余力完成区间上限，再小幅增加负荷并回到区间下端。\n\n### 4.2 训练日志\n\n| 日期 | 动作 | 重量 | 次数×组 | RIR/RPE | 备注 |\n|---|---|---:|---|---|---|\n| 示例 | 高脚杯深蹲 | 16 kg | 10×3 | RIR 3 | 动作稳定 |\n\n### 4.3 调整决策\n\n- 连续进步且恢复好：维持计划。\n- 动作标准下降：先减少负荷或次数。\n- 单项停滞：检查技术、休息和局部训练量。\n- 多项表现下降：检查睡眠、压力、饮食与总训练量。\n\n## 5. 复盘周期\n\n复盘把日志转化为下一轮决策。不同时间尺度回答不同问题：单次记录异常，数周趋势判断计划是否需要改变。\n\n### 5.1 每次训练后\n\n记录表现、余力、疼痛与异常疲劳，不急于根据一次状态重写计划。\n\n### 5.2 每四周\n\n比较训练表现、身体指标、主观恢复和出勤率。只改最可能产生影响的 1–2 个变量。\n","nodes":[{"id":"2-0","level":1,"title":"训练计划工作流","line":1,"parent":null,"children":["2-1","2-4","2-8","2-12","2-16"],"body":"这份文档说明如何把模糊愿望转化为可执行、可记录和可复盘的训练计划。工作流从目标与约束开始，经过周结构和单次训练设计，最后进入渐进与复盘。"},{"id":"2-1","level":2,"title":"1. 从目标到约束","line":5,"parent":"2-0","children":["2-2","2-3"],"body":"目标定义“为什么练”和“怎样算进步”，约束定义现实中“能怎样练”。先处理这两者，可以减少计划看似专业却无法执行的问题。"},{"id":"2-2","level":3,"title":"1.1 写出目标","line":9,"parent":"2-1","children":[],"body":"一个可执行目标需要说明：想改变什么、用什么指标观察、愿意投入多少时间、计划持续多久。\n\n```text\n我的主要目标：\n当前水平与最近训练经历：\n每周可训练天数与单次时长：\n可用器械：\n旧伤、疼痛或医疗限制：\n偏好的训练形式：\n12 周后希望看到的可观察变化：\n```"},{"id":"2-3","level":3,"title":"1.2 盘点约束","line":23,"parent":"2-1","children":[],"body":"- 时间约束：每周频率、通勤、睡眠。\n- 环境约束：家庭、商业健身房、户外。\n- 身体约束：动作耐受、既往伤病、恢复速度。\n- 心理约束：喜欢什么、害怕什么、能否长期执行。"},{"id":"2-4","level":2,"title":"2. 选择周结构","line":30,"parent":"2-0","children":["2-5","2-6","2-7"],"body":"周结构用于把训练刺激分配到日历中。选择依据是可用天数、单次时长、恢复和目标优先级，而不是训练水平对应某种固定分化。"},{"id":"2-5","level":3,"title":"2.1 两天全身","line":34,"parent":"2-4","children":[],"body":"适合新手或时间紧张者。每次覆盖蹲、髋、推、拉、核心与携带中的主要模式。"},{"id":"2-6","level":3,"title":"2.2 三天全身","line":38,"parent":"2-4","children":[],"body":"用 A/B/C 三个训练日分散训练量，既能提高练习频率，也能控制单次时长。"},{"id":"2-7","level":3,"title":"2.3 上下肢四天","line":42,"parent":"2-4","children":[],"body":"适合已有稳定训练习惯、希望增加训练量的人。不是“更高级”的必经路线。"},{"id":"2-8","level":2,"title":"3. 设计单次训练","line":46,"parent":"2-0","children":["2-9","2-10","2-11"],"body":"单次训练设计把周目标翻译成当天的动作顺序、工作组和休息安排。核心是保护重点动作质量，并让总时长和疲劳保持可控。"},{"id":"2-9","level":3,"title":"3.1 热身","line":50,"parent":"2-8","children":[],"body":"热身的目的包括提高体温、熟悉当日动作、逐步接近工作负荷。通常无需把热身变成另一套完整训练。"},{"id":"2-10","level":3,"title":"3.2 动作排序","line":54,"parent":"2-8","children":[],"body":"1. 技术要求高或最重要的动作。\n2. 大肌群复合动作。\n3. 辅助与孤立动作。\n4. 低风险体能或核心收尾。"},{"id":"2-11","level":3,"title":"3.3 工作组处方","line":61,"parent":"2-8","children":[],"body":"初学者可以从每个主要动作 2–3 个工作组开始，多数组保留 2–4 次余力。先稳定动作与出勤，再增加复杂度。"},{"id":"2-12","level":2,"title":"4. 渐进与调整","line":65,"parent":"2-0","children":["2-13","2-14","2-15"],"body":"渐进与调整决定计划怎样随能力和状态变化。先设定简单规则，再根据连续数据行动，可以避免每天凭感觉重写计划。"},{"id":"2-13","level":3,"title":"4.1 双重渐进","line":69,"parent":"2-12","children":[],"body":"设定次数区间，例如 8–12 次。当所有工作组都能以目标余力完成区间上限，再小幅增加负荷并回到区间下端。"},{"id":"2-14","level":3,"title":"4.2 训练日志","line":73,"parent":"2-12","children":[],"body":"| 日期 | 动作 | 重量 | 次数×组 | RIR/RPE | 备注 |\n|---|---|---:|---|---|---|\n| 示例 | 高脚杯深蹲 | 16 kg | 10×3 | RIR 3 | 动作稳定 |"},{"id":"2-15","level":3,"title":"4.3 调整决策","line":79,"parent":"2-12","children":[],"body":"- 连续进步且恢复好：维持计划。\n- 动作标准下降：先减少负荷或次数。\n- 单项停滞：检查技术、休息和局部训练量。\n- 多项表现下降：检查睡眠、压力、饮食与总训练量。"},{"id":"2-16","level":2,"title":"5. 复盘周期","line":86,"parent":"2-0","children":["2-17","2-18"],"body":"复盘把日志转化为下一轮决策。不同时间尺度回答不同问题：单次记录异常，数周趋势判断计划是否需要改变。"},{"id":"2-17","level":3,"title":"5.1 每次训练后","line":90,"parent":"2-16","children":[],"body":"记录表现、余力、疼痛与异常疲劳，不急于根据一次状态重写计划。"},{"id":"2-18","level":3,"title":"5.2 每四周","line":94,"parent":"2-16","children":[],"body":"比较训练表现、身体指标、主观恢复和出勤率。只改最可能产生影响的 1–2 个变量。"}]},{"id":"3","file":"04-cases.md","title":"健身目标与真实案例库","color":"#ff6f91","markdown":"# 健身目标与真实案例库\n\n案例库展示原则如何在不同目标和约束中落地。每个案例依次描述背景、方法、风险与评审标准，重点是理解取舍，而不是机械复制计划。\n\n## 1. 久坐新手建立基础\n\n这个案例关注从低活动状态进入规律训练。首要问题不是追求最大训练量，而是建立动作耐受、基础体能和稳定出勤。\n\n### 1.1 背景与目标\n\n每周可训练两次，每次 45 分钟，希望提高体力、缓解久坐后的僵硬感，并建立习惯。\n\n### 1.2 方法\n\n- 两次全身阻力训练。\n- 每周累计快走，逐步接近公共健康建议。\n- 用动作质量与出勤率作为前四周主要指标。\n\n#### 1.2.1 示例训练\n\n```text\n高脚杯深蹲 3×8–12\n哑铃卧推 3×8–12\n坐姿划船 3×8–12\n罗马尼亚硬拉 2×8–10\n农夫行走 3×30 秒\n全程保留约 3 次余力\n```\n\n### 1.3 评审标准\n\n训练后 24–48 小时能正常生活；四周内出勤率达到 80% 以上；动作逐渐稳定。\n\n## 2. 减脂但不想失去力量\n\n这个案例展示减脂期如何同时管理能量缺口和训练表现。保留力量的关键是避免把节食和额外运动同时推到不可恢复的程度。\n\n### 2.1 背景与目标\n\n已有半年训练经验，希望 12–16 周降低腰围，同时尽量维持主要动作表现。\n\n### 2.2 方法\n\n- 采用温和、可持续的能量缺口。\n- 保留规律阻力训练与足够蛋白质食物。\n- 增加可恢复的步行或低至中强度有氧。\n- 使用 7 日体重平均与腰围趋势，不追逐日波动。\n\n### 2.3 失败模式\n\n大幅削减热量，同时增加高强度训练，导致睡眠变差、力量快速下降和暴食反弹。\n\n## 3. 增肌平台期\n\n平台期案例用于区分真正的适应停滞与执行、测量或恢复问题。排查顺序从最容易验证的变量开始，再进行小幅实验。\n\n### 3.1 背景与目标\n\n训练两年，近两个月围度与重复次数均无明显变化。\n\n### 3.2 排查顺序\n\n1. 是否真正接近目标余力。\n2. 目标肌群周训练量是否长期不变。\n3. 动作是否稳定、可重复。\n4. 能量与蛋白质摄入是否支持目标。\n5. 睡眠和生活压力是否恶化。\n\n### 3.3 小步实验\n\n选择一个重点肌群，每周增加 2 个高质量工作组，保持其他变量大致不变，观察 3–4 周。\n\n## 4. 跑步与力量并行\n\n并行训练案例说明怎样在两个目标之间安排优先级。重点不是消除所有干扰，而是管理总负荷并保护关键训练课的质量。\n\n### 4.1 背景与目标\n\n准备 10 公里比赛，同时希望维持下肢力量。\n\n### 4.2 周安排原则\n\n- 关键跑步课与重下肢训练尽量错开。\n- 先保护最重要的专项训练质量。\n- 增加跑量时，力量训练量可暂时维持或小幅下降。\n\n### 4.3 干扰不是禁止\n\n耐力和力量可以并行发展；问题常来自总负荷、恢复不足和优先级不清，而不是两类训练天然互斥。\n\n## 5. 居家器械有限\n\n器械有限时，训练设计需要从“增加重量”转向操作动作难度、单侧形式、范围、节奏和次数。限制会改变手段，但不必取消渐进。\n\n### 5.1 可用策略\n\n使用单侧动作、更大动作范围、较慢离心、停顿和更高次数，让有限负荷继续产生挑战。\n\n### 5.2 进步证据\n\n相同动作和器械下，完成更多标准次数、更大范围或更低主观用力，也属于进步。\n","nodes":[{"id":"3-0","level":1,"title":"健身目标与真实案例库","line":1,"parent":null,"children":["3-1","3-6","3-10","3-14","3-18"],"body":"案例库展示原则如何在不同目标和约束中落地。每个案例依次描述背景、方法、风险与评审标准，重点是理解取舍，而不是机械复制计划。"},{"id":"3-1","level":2,"title":"1. 久坐新手建立基础","line":5,"parent":"3-0","children":["3-2","3-3","3-5"],"body":"这个案例关注从低活动状态进入规律训练。首要问题不是追求最大训练量，而是建立动作耐受、基础体能和稳定出勤。"},{"id":"3-2","level":3,"title":"1.1 背景与目标","line":9,"parent":"3-1","children":[],"body":"每周可训练两次，每次 45 分钟，希望提高体力、缓解久坐后的僵硬感，并建立习惯。"},{"id":"3-3","level":3,"title":"1.2 方法","line":13,"parent":"3-1","children":["3-4"],"body":"- 两次全身阻力训练。\n- 每周累计快走，逐步接近公共健康建议。\n- 用动作质量与出勤率作为前四周主要指标。"},{"id":"3-4","level":4,"title":"1.2.1 示例训练","line":19,"parent":"3-3","children":[],"body":"```text\n高脚杯深蹲 3×8–12\n哑铃卧推 3×8–12\n坐姿划船 3×8–12\n罗马尼亚硬拉 2×8–10\n农夫行走 3×30 秒\n全程保留约 3 次余力\n```"},{"id":"3-5","level":3,"title":"1.3 评审标准","line":30,"parent":"3-1","children":[],"body":"训练后 24–48 小时能正常生活；四周内出勤率达到 80% 以上；动作逐渐稳定。"},{"id":"3-6","level":2,"title":"2. 减脂但不想失去力量","line":34,"parent":"3-0","children":["3-7","3-8","3-9"],"body":"这个案例展示减脂期如何同时管理能量缺口和训练表现。保留力量的关键是避免把节食和额外运动同时推到不可恢复的程度。"},{"id":"3-7","level":3,"title":"2.1 背景与目标","line":38,"parent":"3-6","children":[],"body":"已有半年训练经验，希望 12–16 周降低腰围，同时尽量维持主要动作表现。"},{"id":"3-8","level":3,"title":"2.2 方法","line":42,"parent":"3-6","children":[],"body":"- 采用温和、可持续的能量缺口。\n- 保留规律阻力训练与足够蛋白质食物。\n- 增加可恢复的步行或低至中强度有氧。\n- 使用 7 日体重平均与腰围趋势，不追逐日波动。"},{"id":"3-9","level":3,"title":"2.3 失败模式","line":49,"parent":"3-6","children":[],"body":"大幅削减热量，同时增加高强度训练，导致睡眠变差、力量快速下降和暴食反弹。"},{"id":"3-10","level":2,"title":"3. 增肌平台期","line":53,"parent":"3-0","children":["3-11","3-12","3-13"],"body":"平台期案例用于区分真正的适应停滞与执行、测量或恢复问题。排查顺序从最容易验证的变量开始，再进行小幅实验。"},{"id":"3-11","level":3,"title":"3.1 背景与目标","line":57,"parent":"3-10","children":[],"body":"训练两年，近两个月围度与重复次数均无明显变化。"},{"id":"3-12","level":3,"title":"3.2 排查顺序","line":61,"parent":"3-10","children":[],"body":"1. 是否真正接近目标余力。\n2. 目标肌群周训练量是否长期不变。\n3. 动作是否稳定、可重复。\n4. 能量与蛋白质摄入是否支持目标。\n5. 睡眠和生活压力是否恶化。"},{"id":"3-13","level":3,"title":"3.3 小步实验","line":69,"parent":"3-10","children":[],"body":"选择一个重点肌群，每周增加 2 个高质量工作组，保持其他变量大致不变，观察 3–4 周。"},{"id":"3-14","level":2,"title":"4. 跑步与力量并行","line":73,"parent":"3-0","children":["3-15","3-16","3-17"],"body":"并行训练案例说明怎样在两个目标之间安排优先级。重点不是消除所有干扰，而是管理总负荷并保护关键训练课的质量。"},{"id":"3-15","level":3,"title":"4.1 背景与目标","line":77,"parent":"3-14","children":[],"body":"准备 10 公里比赛，同时希望维持下肢力量。"},{"id":"3-16","level":3,"title":"4.2 周安排原则","line":81,"parent":"3-14","children":[],"body":"- 关键跑步课与重下肢训练尽量错开。\n- 先保护最重要的专项训练质量。\n- 增加跑量时，力量训练量可暂时维持或小幅下降。"},{"id":"3-17","level":3,"title":"4.3 干扰不是禁止","line":87,"parent":"3-14","children":[],"body":"耐力和力量可以并行发展；问题常来自总负荷、恢复不足和优先级不清，而不是两类训练天然互斥。"},{"id":"3-18","level":2,"title":"5. 居家器械有限","line":91,"parent":"3-0","children":["3-19","3-20"],"body":"器械有限时，训练设计需要从“增加重量”转向操作动作难度、单侧形式、范围、节奏和次数。限制会改变手段，但不必取消渐进。"},{"id":"3-19","level":3,"title":"5.1 可用策略","line":95,"parent":"3-18","children":[],"body":"使用单侧动作、更大动作范围、较慢离心、停顿和更高次数，让有限负荷继续产生挑战。"},{"id":"3-20","level":3,"title":"5.2 进步证据","line":99,"parent":"3-18","children":[],"body":"相同动作和器械下，完成更多标准次数、更大范围或更低主观用力，也属于进步。"}]},{"id":"4","file":"05-movement-system.md","title":"动作模式与训练系统手册","color":"#9b8cff","markdown":"# 动作模式与训练系统手册\n\n这份手册用动作功能而不是器械名称组织训练。H2 描述动作系统，H3 解释具体模式的用途，H4 则提供观察或学习细节。\n\n## 1. 下肢动作\n\n下肢动作通过膝、髋和踝的协作完成支撑、下蹲、跨步与推进。按模式理解动作，能在器械变化时保留相似的训练功能。\n\n### 1.1 蹲\n\n蹲以膝、髋共同屈伸为主。高脚杯深蹲、前蹲、后蹲和腿举都是不同约束下的选择，不存在对所有人唯一正确的版本。\n\n#### 1.1.1 观察要点\n\n- 足部保持稳定接触。\n- 膝盖与脚尖方向大致协调。\n- 深度取决于控制、目标和个体结构。\n- 逐步增加负荷，不用疼痛换深度。\n\n### 1.2 髋铰链\n\n硬拉、罗马尼亚硬拉与壶铃摆动都需要组织髋部运动，但速度和目的不同。\n\n#### 1.2.1 学习提示\n\n想象“把臀部向后送”，保持负荷靠近身体，并在可控制的躯干位置下训练。\n\n### 1.3 单腿\n\n弓步、分腿蹲和台阶上步可提高单侧力量与稳定能力，也能用较轻器械产生足够挑战。\n\n## 2. 上肢动作\n\n上肢训练可按推拉方向组织。水平与垂直方向改变关节路径和肌群分工，选择时应结合目标与肩部耐受。\n\n### 2.1 水平推\n\n俯卧撑、哑铃卧推与杠铃卧推主要训练胸、肩前束与肱三头肌。根据肩部舒适度调整握距和肘部路径。\n\n### 2.2 水平拉\n\n各类划船训练背部与肩胛周围肌群。重点是稳定身体、控制肩胛与上臂，而不是用惯性搬动重量。\n\n### 2.3 垂直推拉\n\n推举、下拉和引体向上覆盖不同方向的上肢力量。若头上动作不舒适，可使用地雷管推举等替代。\n\n## 3. 核心与携带\n\n核心与携带训练身体在四肢发力和移动时控制躯干。它们的价值在于传递力量和维持姿势，而不只是制造腹部疲劳。\n\n### 3.1 核心功能\n\n核心训练不只等于卷腹，还包括抵抗伸展、旋转和侧屈，以及在四肢动作中传递力量。\n\n### 3.2 携带\n\n农夫行走、单侧提重行走把握力、核心和步态整合在一起，适合做简洁的全身收尾。\n\n## 4. 有氧系统\n\n有氧系统描述不同持续时间和强度下的心肺工作。训练选择应同时考虑健康基线、专项目标和疲劳成本。\n\n### 4.1 中等强度\n\n呼吸加快但仍能说短句，可用“谈话测试”做粗略判断。快走、骑车、游泳和椭圆机都可以。\n\n### 4.2 高强度\n\n高强度间歇节省时间但疲劳成本更高。它不是减脂必需品，也不应替代全部低至中强度活动。\n\n### 4.3 公共健康基线\n\nWHO 建议健康成年人每周进行 150–300 分钟中等强度有氧活动，或 75–150 分钟高强度有氧活动，并在每周至少 2 天进行涉及主要肌群的力量活动。任何活动通常好过完全不活动。\n\n## 5. 器械选择\n\n器械是施加阻力的工具，不代表训练等级。比较器械时，应看稳定需求、负荷范围、可调节性和个人使用环境。\n\n### 5.1 自由重量\n\n灵活、可量化，但需要更多动作控制和环境管理。\n\n### 5.2 固定器械\n\n稳定、容易接近局部力竭，适合增肌与降低技术门槛，不是“低级选择”。\n\n### 5.3 弹力带与自重\n\n便携且适合居家。限制在于负荷量化和某些动作的阻力曲线，但通过动作选择仍可构建完整计划。\n","nodes":[{"id":"4-0","level":1,"title":"动作模式与训练系统手册","line":1,"parent":null,"children":["4-1","4-7","4-11","4-14","4-18"],"body":"这份手册用动作功能而不是器械名称组织训练。H2 描述动作系统，H3 解释具体模式的用途，H4 则提供观察或学习细节。"},{"id":"4-1","level":2,"title":"1. 下肢动作","line":5,"parent":"4-0","children":["4-2","4-4","4-6"],"body":"下肢动作通过膝、髋和踝的协作完成支撑、下蹲、跨步与推进。按模式理解动作，能在器械变化时保留相似的训练功能。"},{"id":"4-2","level":3,"title":"1.1 蹲","line":9,"parent":"4-1","children":["4-3"],"body":"蹲以膝、髋共同屈伸为主。高脚杯深蹲、前蹲、后蹲和腿举都是不同约束下的选择，不存在对所有人唯一正确的版本。"},{"id":"4-3","level":4,"title":"1.1.1 观察要点","line":13,"parent":"4-2","children":[],"body":"- 足部保持稳定接触。\n- 膝盖与脚尖方向大致协调。\n- 深度取决于控制、目标和个体结构。\n- 逐步增加负荷，不用疼痛换深度。"},{"id":"4-4","level":3,"title":"1.2 髋铰链","line":20,"parent":"4-1","children":["4-5"],"body":"硬拉、罗马尼亚硬拉与壶铃摆动都需要组织髋部运动，但速度和目的不同。"},{"id":"4-5","level":4,"title":"1.2.1 学习提示","line":24,"parent":"4-4","children":[],"body":"想象“把臀部向后送”，保持负荷靠近身体，并在可控制的躯干位置下训练。"},{"id":"4-6","level":3,"title":"1.3 单腿","line":28,"parent":"4-1","children":[],"body":"弓步、分腿蹲和台阶上步可提高单侧力量与稳定能力，也能用较轻器械产生足够挑战。"},{"id":"4-7","level":2,"title":"2. 上肢动作","line":32,"parent":"4-0","children":["4-8","4-9","4-10"],"body":"上肢训练可按推拉方向组织。水平与垂直方向改变关节路径和肌群分工，选择时应结合目标与肩部耐受。"},{"id":"4-8","level":3,"title":"2.1 水平推","line":36,"parent":"4-7","children":[],"body":"俯卧撑、哑铃卧推与杠铃卧推主要训练胸、肩前束与肱三头肌。根据肩部舒适度调整握距和肘部路径。"},{"id":"4-9","level":3,"title":"2.2 水平拉","line":40,"parent":"4-7","children":[],"body":"各类划船训练背部与肩胛周围肌群。重点是稳定身体、控制肩胛与上臂，而不是用惯性搬动重量。"},{"id":"4-10","level":3,"title":"2.3 垂直推拉","line":44,"parent":"4-7","children":[],"body":"推举、下拉和引体向上覆盖不同方向的上肢力量。若头上动作不舒适，可使用地雷管推举等替代。"},{"id":"4-11","level":2,"title":"3. 核心与携带","line":48,"parent":"4-0","children":["4-12","4-13"],"body":"核心与携带训练身体在四肢发力和移动时控制躯干。它们的价值在于传递力量和维持姿势，而不只是制造腹部疲劳。"},{"id":"4-12","level":3,"title":"3.1 核心功能","line":52,"parent":"4-11","children":[],"body":"核心训练不只等于卷腹，还包括抵抗伸展、旋转和侧屈，以及在四肢动作中传递力量。"},{"id":"4-13","level":3,"title":"3.2 携带","line":56,"parent":"4-11","children":[],"body":"农夫行走、单侧提重行走把握力、核心和步态整合在一起，适合做简洁的全身收尾。"},{"id":"4-14","level":2,"title":"4. 有氧系统","line":60,"parent":"4-0","children":["4-15","4-16","4-17"],"body":"有氧系统描述不同持续时间和强度下的心肺工作。训练选择应同时考虑健康基线、专项目标和疲劳成本。"},{"id":"4-15","level":3,"title":"4.1 中等强度","line":64,"parent":"4-14","children":[],"body":"呼吸加快但仍能说短句，可用“谈话测试”做粗略判断。快走、骑车、游泳和椭圆机都可以。"},{"id":"4-16","level":3,"title":"4.2 高强度","line":68,"parent":"4-14","children":[],"body":"高强度间歇节省时间但疲劳成本更高。它不是减脂必需品，也不应替代全部低至中强度活动。"},{"id":"4-17","level":3,"title":"4.3 公共健康基线","line":72,"parent":"4-14","children":[],"body":"WHO 建议健康成年人每周进行 150–300 分钟中等强度有氧活动，或 75–150 分钟高强度有氧活动，并在每周至少 2 天进行涉及主要肌群的力量活动。任何活动通常好过完全不活动。"},{"id":"4-18","level":2,"title":"5. 器械选择","line":76,"parent":"4-0","children":["4-19","4-20","4-21"],"body":"器械是施加阻力的工具，不代表训练等级。比较器械时，应看稳定需求、负荷范围、可调节性和个人使用环境。"},{"id":"4-19","level":3,"title":"5.1 自由重量","line":80,"parent":"4-18","children":[],"body":"灵活、可量化，但需要更多动作控制和环境管理。"},{"id":"4-20","level":3,"title":"5.2 固定器械","line":84,"parent":"4-18","children":[],"body":"稳定、容易接近局部力竭，适合增肌与降低技术门槛，不是“低级选择”。"},{"id":"4-21","level":3,"title":"5.3 弹力带与自重","line":88,"parent":"4-18","children":[],"body":"便携且适合居家。限制在于负荷量化和某些动作的阻力曲线，但通过动作选择仍可构建完整计划。"}]},{"id":"5","file":"06-nutrition-recovery.md","title":"营养、恢复与补剂","color":"#57e39d","markdown":"# 营养、恢复与补剂\n\n营养与恢复决定训练刺激能否被身体吸收和重复。内容按优先级展开：先处理总能量、饮食结构和睡眠，再判断补剂与恢复工具的边际价值。\n\n## 1. 营养优先级\n\n营养优先级帮助把注意力放在影响最大的变量上。总能量决定长期方向，宏量营养素支持组织和训练，细节优化排在可持续饮食之后。\n\n### 1.1 总能量\n\n增肌通常需要足够能量支持，减脂需要可持续的能量缺口。极端速度会增加训练表现下降、肌肉流失与反弹风险。\n\n### 1.2 蛋白质\n\n优先通过日常食物获得蛋白质，并把摄入分散到多餐。需求因体重、总能量、训练目标和健康情况而异；肾脏疾病等情况应咨询专业人士。\n\n### 1.3 碳水与脂肪\n\n碳水化合物支持高质量训练与糖原恢复；脂肪参与激素、细胞与脂溶性维生素相关功能。不要把任何一种宏量营养素妖魔化。\n\n## 2. 饮食结构\n\n饮食结构把抽象的营养目标转化为日常餐食。好的结构应兼顾营养、训练需求、文化偏好、预算和长期执行。\n\n### 2.1 盘餐法\n\n- 一部分优质蛋白质食物。\n- 足量蔬菜与水果。\n- 根据活动量配置主食或其他碳水来源。\n- 适量脂肪与水分。\n\n### 2.2 训练前后\n\n训练前以易消化、包含碳水和蛋白质的餐食为主；训练后正常进餐通常足够，不必焦虑所谓“30 分钟窗口”。\n\n## 3. 睡眠与压力\n\n睡眠与生活压力共同影响恢复预算。训练计划不能与生活分开评估，因为工作、情绪和照护压力也会改变疲劳水平。\n\n### 3.1 睡眠\n\n睡眠不足会影响主观用力、动作学习、食欲与恢复。固定起床时间、减少睡前强刺激和管理咖啡因常比购买恢复产品更有价值。\n\n### 3.2 压力预算\n\n训练压力会和工作、照护、情绪压力共享恢复资源。高压力周可以保留训练频率，但降低总量或力竭程度。\n\n## 4. 补剂判断\n\n补剂判断不是罗列“有效产品”，而是比较证据、收益大小、风险和机会成本。基础饮食与睡眠没有稳定前，补剂通常不是主要限制因素。\n\n### 4.1 证据、收益与风险\n\n先问三个问题：证据是否支持目标？收益大小是否值得？产品是否存在剂量、污染、药物相互作用或禁赛风险？\n\n### 4.2 常见补剂\n\n| 补剂 | 可能用途 | 关键提醒 |\n|---|---|---|\n| 蛋白粉 | 方便补充蛋白质 | 本质是食物工具，不是增肌开关 |\n| 肌酸一水合物 | 支持高强度表现与训练适应 | 注意个体健康、产品质量与体重水分变化 |\n| 咖啡因 | 提高警觉与部分运动表现 | 可能影响睡眠、心率和焦虑 |\n| 维生素/矿物质 | 纠正不足 | 不应盲目大剂量使用 |\n\n### 4.3 NIH ODS 原则\n\n运动补剂的有效性和安全性差异很大。标签“天然”不代表安全，也不能保证成分、剂量或无污染；结合用药和健康情况时应咨询医生或药师。\n\n## 5. 恢复工具\n\n恢复工具主要改善舒适度、放松或短期状态。它们可以辅助训练，但不能修复长期过量负荷或持续睡眠不足。\n\n### 5.1 主动恢复\n\n轻松步行、低强度骑行或舒适活动可帮助维持活动感，但不需要把恢复日变成隐藏的高强度训练。\n\n### 5.2 拉伸、按摩与冷热\n\n这些工具可以改善舒适度或短期感受，但不能替代训练负荷管理、睡眠和充足营养。\n","nodes":[{"id":"5-0","level":1,"title":"营养、恢复与补剂","line":1,"parent":null,"children":["5-1","5-5","5-8","5-11","5-15"],"body":"营养与恢复决定训练刺激能否被身体吸收和重复。内容按优先级展开：先处理总能量、饮食结构和睡眠，再判断补剂与恢复工具的边际价值。"},{"id":"5-1","level":2,"title":"1. 营养优先级","line":5,"parent":"5-0","children":["5-2","5-3","5-4"],"body":"营养优先级帮助把注意力放在影响最大的变量上。总能量决定长期方向，宏量营养素支持组织和训练，细节优化排在可持续饮食之后。"},{"id":"5-2","level":3,"title":"1.1 总能量","line":9,"parent":"5-1","children":[],"body":"增肌通常需要足够能量支持，减脂需要可持续的能量缺口。极端速度会增加训练表现下降、肌肉流失与反弹风险。"},{"id":"5-3","level":3,"title":"1.2 蛋白质","line":13,"parent":"5-1","children":[],"body":"优先通过日常食物获得蛋白质，并把摄入分散到多餐。需求因体重、总能量、训练目标和健康情况而异；肾脏疾病等情况应咨询专业人士。"},{"id":"5-4","level":3,"title":"1.3 碳水与脂肪","line":17,"parent":"5-1","children":[],"body":"碳水化合物支持高质量训练与糖原恢复；脂肪参与激素、细胞与脂溶性维生素相关功能。不要把任何一种宏量营养素妖魔化。"},{"id":"5-5","level":2,"title":"2. 饮食结构","line":21,"parent":"5-0","children":["5-6","5-7"],"body":"饮食结构把抽象的营养目标转化为日常餐食。好的结构应兼顾营养、训练需求、文化偏好、预算和长期执行。"},{"id":"5-6","level":3,"title":"2.1 盘餐法","line":25,"parent":"5-5","children":[],"body":"- 一部分优质蛋白质食物。\n- 足量蔬菜与水果。\n- 根据活动量配置主食或其他碳水来源。\n- 适量脂肪与水分。"},{"id":"5-7","level":3,"title":"2.2 训练前后","line":32,"parent":"5-5","children":[],"body":"训练前以易消化、包含碳水和蛋白质的餐食为主；训练后正常进餐通常足够，不必焦虑所谓“30 分钟窗口”。"},{"id":"5-8","level":2,"title":"3. 睡眠与压力","line":36,"parent":"5-0","children":["5-9","5-10"],"body":"睡眠与生活压力共同影响恢复预算。训练计划不能与生活分开评估，因为工作、情绪和照护压力也会改变疲劳水平。"},{"id":"5-9","level":3,"title":"3.1 睡眠","line":40,"parent":"5-8","children":[],"body":"睡眠不足会影响主观用力、动作学习、食欲与恢复。固定起床时间、减少睡前强刺激和管理咖啡因常比购买恢复产品更有价值。"},{"id":"5-10","level":3,"title":"3.2 压力预算","line":44,"parent":"5-8","children":[],"body":"训练压力会和工作、照护、情绪压力共享恢复资源。高压力周可以保留训练频率，但降低总量或力竭程度。"},{"id":"5-11","level":2,"title":"4. 补剂判断","line":48,"parent":"5-0","children":["5-12","5-13","5-14"],"body":"补剂判断不是罗列“有效产品”，而是比较证据、收益大小、风险和机会成本。基础饮食与睡眠没有稳定前，补剂通常不是主要限制因素。"},{"id":"5-12","level":3,"title":"4.1 证据、收益与风险","line":52,"parent":"5-11","children":[],"body":"先问三个问题：证据是否支持目标？收益大小是否值得？产品是否存在剂量、污染、药物相互作用或禁赛风险？"},{"id":"5-13","level":3,"title":"4.2 常见补剂","line":56,"parent":"5-11","children":[],"body":"| 补剂 | 可能用途 | 关键提醒 |\n|---|---|---|\n| 蛋白粉 | 方便补充蛋白质 | 本质是食物工具，不是增肌开关 |\n| 肌酸一水合物 | 支持高强度表现与训练适应 | 注意个体健康、产品质量与体重水分变化 |\n| 咖啡因 | 提高警觉与部分运动表现 | 可能影响睡眠、心率和焦虑 |\n| 维生素/矿物质 | 纠正不足 | 不应盲目大剂量使用 |"},{"id":"5-14","level":3,"title":"4.3 NIH ODS 原则","line":65,"parent":"5-11","children":[],"body":"运动补剂的有效性和安全性差异很大。标签“天然”不代表安全，也不能保证成分、剂量或无污染；结合用药和健康情况时应咨询医生或药师。"},{"id":"5-15","level":2,"title":"5. 恢复工具","line":69,"parent":"5-0","children":["5-16","5-17"],"body":"恢复工具主要改善舒适度、放松或短期状态。它们可以辅助训练，但不能修复长期过量负荷或持续睡眠不足。"},{"id":"5-16","level":3,"title":"5.1 主动恢复","line":73,"parent":"5-15","children":[],"body":"轻松步行、低强度骑行或舒适活动可帮助维持活动感，但不需要把恢复日变成隐藏的高强度训练。"},{"id":"5-17","level":3,"title":"5.2 拉伸、按摩与冷热","line":77,"parent":"5-15","children":[],"body":"这些工具可以改善舒适度或短期感受，但不能替代训练负荷管理、睡眠和充足营养。"}]},{"id":"6","file":"07-diagnosis-review.md","title":"训练分析、排错与质量评审","color":"#ffd84d","markdown":"# 训练分析、排错与质量评审\n\n这份文档提供从现象到行动的排错框架。分析时先定义问题，再按执行、处方、恢复和测量分层检查，最后用小幅调整验证假设。\n\n## 1. 先定义问题\n\n问题定义决定后续收集什么证据。先区分结果没有变化，还是计划没有被稳定执行，可以避免把行为问题误判为方法问题。\n\n### 1.1 结果问题\n\n体重、围度、力量或耐力没有按预期变化。先确认指标是否可靠、观察窗口是否足够。\n\n### 1.2 过程问题\n\n训练没有完成、动作不稳定、疲劳过高或饮食无法持续。过程问题通常比“计划不够高级”更值得先处理。\n\n## 2. 四层排查法\n\n四层排查法按照“最容易验证、最常影响结果”的顺序组织原因。每一层都先找事实，再提出解释，不急于同时修改所有变量。\n\n### 2.1 执行层\n\n- 实际完成率是多少？\n- 工作组是否达到计划强度？\n- 记录是否足以还原训练？\n\n### 2.2 处方层\n\n- 动作是否服务目标？\n- 周训练量和频率是否合理？\n- 渐进规则是否明确？\n\n### 2.3 恢复层\n\n- 睡眠是否下降？\n- 能量与蛋白质是否足够？\n- 工作与情绪压力是否上升？\n\n### 2.4 测量层\n\n- 是否被单日体重误导？\n- 动作标准是否变化导致数字不可比？\n- 测试是否受到热身、器械和时间影响？\n\n## 3. 疼痛与不适决策\n\n疼痛决策的目标不是在线判断具体组织，而是决定应该停止求助、调整观察，还是继续正常训练。症状变化和日常功能比单一疼痛数字更重要。\n\n### 3.1 立即停止并求助\n\n出现胸痛、晕厥、明显神经症状、严重创伤或快速加重的异常症状，应停止训练并寻求医疗帮助。\n\n### 3.2 可调整观察\n\n轻微、稳定且不加重的不适，可以尝试降低负荷、范围、速度或更换动作，并观察日常功能与后续变化。\n\n### 3.3 不能在线完成的事\n\n仅凭文字或单个视频不能可靠诊断组织损伤。专业评估需要病史、体格检查和必要时的进一步检查。\n\n## 4. 计划质量评分\n\n质量评分用于审查计划是否目标明确、可执行、能渐进并包含安全边界。分数的作用是定位薄弱环节，而不是制造一个绝对好坏排名。\n\n| 维度 | 0 分 | 1 分 | 2 分 |\n|---|---|---|---|\n| 目标匹配 | 动作随机 | 部分相关 | 变量与目标一致 |\n| 可执行性 | 超出时间资源 | 勉强执行 | 适配日程与偏好 |\n| 渐进规则 | 没有 | 模糊 | 明确可操作 |\n| 疲劳管理 | 忽略 | 被动处理 | 有监测与调整 |\n| 安全边界 | 缺失 | 一般提醒 | 有红旗与转介 |\n\n## 5. 复盘模板\n\n复盘模板把一个周期的表现、恢复和限制因素整理为下一周期的决策输入。填写时应区分观察事实、可能解释和准备采取的行动。\n\n```text\n本周期目标：\n完成率：\n最明显的进步证据：\n最主要的限制因素：\n疼痛与异常症状：\n睡眠、压力与食欲变化：\n下周期保持不变的内容：\n只调整的 1–2 个变量：\n调整后的判断窗口：\n```\n","nodes":[{"id":"6-0","level":1,"title":"训练分析、排错与质量评审","line":1,"parent":null,"children":["6-1","6-4","6-9","6-13","6-14"],"body":"这份文档提供从现象到行动的排错框架。分析时先定义问题，再按执行、处方、恢复和测量分层检查，最后用小幅调整验证假设。"},{"id":"6-1","level":2,"title":"1. 先定义问题","line":5,"parent":"6-0","children":["6-2","6-3"],"body":"问题定义决定后续收集什么证据。先区分结果没有变化，还是计划没有被稳定执行，可以避免把行为问题误判为方法问题。"},{"id":"6-2","level":3,"title":"1.1 结果问题","line":9,"parent":"6-1","children":[],"body":"体重、围度、力量或耐力没有按预期变化。先确认指标是否可靠、观察窗口是否足够。"},{"id":"6-3","level":3,"title":"1.2 过程问题","line":13,"parent":"6-1","children":[],"body":"训练没有完成、动作不稳定、疲劳过高或饮食无法持续。过程问题通常比“计划不够高级”更值得先处理。"},{"id":"6-4","level":2,"title":"2. 四层排查法","line":17,"parent":"6-0","children":["6-5","6-6","6-7","6-8"],"body":"四层排查法按照“最容易验证、最常影响结果”的顺序组织原因。每一层都先找事实，再提出解释，不急于同时修改所有变量。"},{"id":"6-5","level":3,"title":"2.1 执行层","line":21,"parent":"6-4","children":[],"body":"- 实际完成率是多少？\n- 工作组是否达到计划强度？\n- 记录是否足以还原训练？"},{"id":"6-6","level":3,"title":"2.2 处方层","line":27,"parent":"6-4","children":[],"body":"- 动作是否服务目标？\n- 周训练量和频率是否合理？\n- 渐进规则是否明确？"},{"id":"6-7","level":3,"title":"2.3 恢复层","line":33,"parent":"6-4","children":[],"body":"- 睡眠是否下降？\n- 能量与蛋白质是否足够？\n- 工作与情绪压力是否上升？"},{"id":"6-8","level":3,"title":"2.4 测量层","line":39,"parent":"6-4","children":[],"body":"- 是否被单日体重误导？\n- 动作标准是否变化导致数字不可比？\n- 测试是否受到热身、器械和时间影响？"},{"id":"6-9","level":2,"title":"3. 疼痛与不适决策","line":45,"parent":"6-0","children":["6-10","6-11","6-12"],"body":"疼痛决策的目标不是在线判断具体组织，而是决定应该停止求助、调整观察，还是继续正常训练。症状变化和日常功能比单一疼痛数字更重要。"},{"id":"6-10","level":3,"title":"3.1 立即停止并求助","line":49,"parent":"6-9","children":[],"body":"出现胸痛、晕厥、明显神经症状、严重创伤或快速加重的异常症状，应停止训练并寻求医疗帮助。"},{"id":"6-11","level":3,"title":"3.2 可调整观察","line":53,"parent":"6-9","children":[],"body":"轻微、稳定且不加重的不适，可以尝试降低负荷、范围、速度或更换动作，并观察日常功能与后续变化。"},{"id":"6-12","level":3,"title":"3.3 不能在线完成的事","line":57,"parent":"6-9","children":[],"body":"仅凭文字或单个视频不能可靠诊断组织损伤。专业评估需要病史、体格检查和必要时的进一步检查。"},{"id":"6-13","level":2,"title":"4. 计划质量评分","line":61,"parent":"6-0","children":[],"body":"质量评分用于审查计划是否目标明确、可执行、能渐进并包含安全边界。分数的作用是定位薄弱环节，而不是制造一个绝对好坏排名。\n\n| 维度 | 0 分 | 1 分 | 2 分 |\n|---|---|---|---|\n| 目标匹配 | 动作随机 | 部分相关 | 变量与目标一致 |\n| 可执行性 | 超出时间资源 | 勉强执行 | 适配日程与偏好 |\n| 渐进规则 | 没有 | 模糊 | 明确可操作 |\n| 疲劳管理 | 忽略 | 被动处理 | 有监测与调整 |\n| 安全边界 | 缺失 | 一般提醒 | 有红旗与转介 |"},{"id":"6-14","level":2,"title":"5. 复盘模板","line":73,"parent":"6-0","children":[],"body":"复盘模板把一个周期的表现、恢复和限制因素整理为下一周期的决策输入。填写时应区分观察事实、可能解释和准备采取的行动。\n\n```text\n本周期目标：\n完成率：\n最明显的进步证据：\n最主要的限制因素：\n疼痛与异常症状：\n睡眠、压力与食欲变化：\n下周期保持不变的内容：\n只调整的 1–2 个变量：\n调整后的判断窗口：\n```"}]},{"id":"7","file":"08-roadmap-prompts-sources.md","title":"学习路线、提示词与权威资料","color":"#72a8ff","markdown":"# 学习路线、提示词与权威资料\n\n这份文档把知识库转化为学习行动、检查清单和可复用提示词，并标注重要资料的来源与更新属性。\n\n## 1. 八周学习路线\n\n八周路线按“理解—执行—连接—复盘”推进。周数只是节奏参考，真正的升级条件是上一阶段技能能够稳定使用。\n\n### 1.1 第 1–2 周：建立基线\n\n学习 RIR、动作模式和安全红旗；完成两次全身训练；记录步数或有氧时间。\n\n### 1.2 第 3–4 周：学会渐进\n\n使用双重渐进，比较动作表现与主观余力，避免每次训练都随意更换动作。\n\n### 1.3 第 5–6 周：连接恢复\n\n记录睡眠、压力与饮食结构，观察它们与训练表现的关系。\n\n### 1.4 第 7–8 周：完成复盘\n\n用多维指标评估结果，只调整少量变量，形成下一个周期。\n\n## 2. 自我评估清单\n\n自我评估用于判断知识是否已经转化为可操作能力。每个条目都应能通过解释、示范、记录或实际决策验证。\n\n### 2.1 起步者\n\n- 我能解释训练刺激与恢复的关系。\n- 我知道 RIR 2 大致是什么意思。\n- 我能完成蹲、髋、推、拉的基础变式。\n- 我知道哪些症状需要停止训练并求助。\n\n### 2.2 实践者\n\n- 我能把目标写成周计划。\n- 我有明确的渐进与减量规则。\n- 我用趋势而非单次数据做判断。\n- 我能区分平台期与执行不足。\n\n## 3. AI 提示词库\n\n提示词库帮助 AI 获得目标、约束、数据和安全边界。模板不是替代判断，而是让输入完整、输出可审查，并减少模型擅自补全关键信息。\n\n### 3.1 生成训练计划\n\n```text\n你是一名遵循循证原则、重视安全边界的健身计划助手。\n请根据以下信息生成 [周期] 周计划：\n- 主要目标：\n- 训练经验：\n- 每周天数与时长：\n- 可用器械：\n- 偏好与不喜欢的动作：\n- 疼痛、旧伤、疾病或医生限制：\n\n输出要求：\n1. 给出周结构、动作、组次区间和 RIR。\n2. 给出热身、双重渐进与减量规则。\n3. 解释每个动作如何服务目标。\n4. 明确不能替代医疗评估的部分。\n5. 若信息不足，先列出需要补充的问题。\n```\n\n### 3.2 训练日志复盘\n\n```text\n请把下面训练日志按“执行、处方、恢复、测量”四层分析。\n不要因为一次表现下降就下结论。\n先列事实与趋势，再提出最多 3 个可能解释，\n最后给出只改变 1–2 个变量的两周实验方案。\n日志：\n[粘贴日志]\n```\n\n### 3.3 动作替代\n\n```text\n目标动作：[动作]\n训练目的：[肌群/力量/技能]\n不适位置与发生阶段：\n可用器械：\n\n请给出 3 个由接近到差异更大的替代动作，\n说明保留了什么训练功能、牺牲了什么，\n并列出需要专业评估的红旗。不要做组织损伤诊断。\n```\n\n## 4. 权威资料与新鲜度\n\n资料库区分相对稳定的基础原则与会持续更新的行业建议。引用指南时要记录发布机构和日期，并判断群体建议能否用于当前个人情境。\n\n### 4.1 公共活动建议\n\n- WHO《身体活动与久坐行为指南》（2020）：https://www.who.int/publications/i/item/9789240015128\n- CDC 成人身体活动概览（页面持续更新）：https://www.cdc.gov/physical-activity-basics/guidelines/adults.html\n\n### 4.2 阻力训练\n\n- ACSM 2026 阻力训练指南更新：https://acsm.org/resistance-training-guidelines-update-2026/\n- ACSM Position Stands：https://acsm.org/education-resources/pronouncements-scientific-communications/position-stands/\n\n### 4.3 补剂\n\n- NIH ODS 运动表现补剂资料：https://ods.od.nih.gov/factsheets/ExerciseAndAthleticPerformance-HealthProfessional/\n\n### 4.4 如何使用资料\n\n公共健康指南提供群体层面的起点，不等于个体处方。专业立场文件会随证据更新；涉及疾病、药物、妊娠、伤病和进食障碍时，应转向相应临床专业人士。\n","nodes":[{"id":"7-0","level":1,"title":"学习路线、提示词与权威资料","line":1,"parent":null,"children":["7-1","7-6","7-9","7-13"],"body":"这份文档把知识库转化为学习行动、检查清单和可复用提示词，并标注重要资料的来源与更新属性。"},{"id":"7-1","level":2,"title":"1. 八周学习路线","line":5,"parent":"7-0","children":["7-2","7-3","7-4","7-5"],"body":"八周路线按“理解—执行—连接—复盘”推进。周数只是节奏参考，真正的升级条件是上一阶段技能能够稳定使用。"},{"id":"7-2","level":3,"title":"1.1 第 1–2 周：建立基线","line":9,"parent":"7-1","children":[],"body":"学习 RIR、动作模式和安全红旗；完成两次全身训练；记录步数或有氧时间。"},{"id":"7-3","level":3,"title":"1.2 第 3–4 周：学会渐进","line":13,"parent":"7-1","children":[],"body":"使用双重渐进，比较动作表现与主观余力，避免每次训练都随意更换动作。"},{"id":"7-4","level":3,"title":"1.3 第 5–6 周：连接恢复","line":17,"parent":"7-1","children":[],"body":"记录睡眠、压力与饮食结构，观察它们与训练表现的关系。"},{"id":"7-5","level":3,"title":"1.4 第 7–8 周：完成复盘","line":21,"parent":"7-1","children":[],"body":"用多维指标评估结果，只调整少量变量，形成下一个周期。"},{"id":"7-6","level":2,"title":"2. 自我评估清单","line":25,"parent":"7-0","children":["7-7","7-8"],"body":"自我评估用于判断知识是否已经转化为可操作能力。每个条目都应能通过解释、示范、记录或实际决策验证。"},{"id":"7-7","level":3,"title":"2.1 起步者","line":29,"parent":"7-6","children":[],"body":"- 我能解释训练刺激与恢复的关系。\n- 我知道 RIR 2 大致是什么意思。\n- 我能完成蹲、髋、推、拉的基础变式。\n- 我知道哪些症状需要停止训练并求助。"},{"id":"7-8","level":3,"title":"2.2 实践者","line":36,"parent":"7-6","children":[],"body":"- 我能把目标写成周计划。\n- 我有明确的渐进与减量规则。\n- 我用趋势而非单次数据做判断。\n- 我能区分平台期与执行不足。"},{"id":"7-9","level":2,"title":"3. AI 提示词库","line":43,"parent":"7-0","children":["7-10","7-11","7-12"],"body":"提示词库帮助 AI 获得目标、约束、数据和安全边界。模板不是替代判断，而是让输入完整、输出可审查，并减少模型擅自补全关键信息。"},{"id":"7-10","level":3,"title":"3.1 生成训练计划","line":47,"parent":"7-9","children":[],"body":"```text\n你是一名遵循循证原则、重视安全边界的健身计划助手。\n请根据以下信息生成 [周期] 周计划：\n- 主要目标：\n- 训练经验：\n- 每周天数与时长：\n- 可用器械：\n- 偏好与不喜欢的动作：\n- 疼痛、旧伤、疾病或医生限制：\n\n输出要求：\n1. 给出周结构、动作、组次区间和 RIR。\n2. 给出热身、双重渐进与减量规则。\n3. 解释每个动作如何服务目标。\n4. 明确不能替代医疗评估的部分。\n5. 若信息不足，先列出需要补充的问题。\n```"},{"id":"7-11","level":3,"title":"3.2 训练日志复盘","line":67,"parent":"7-9","children":[],"body":"```text\n请把下面训练日志按“执行、处方、恢复、测量”四层分析。\n不要因为一次表现下降就下结论。\n先列事实与趋势，再提出最多 3 个可能解释，\n最后给出只改变 1–2 个变量的两周实验方案。\n日志：\n[粘贴日志] const escapeHtml=s=>s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[c]));
function inline(s){return escapeHtml(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/`(.+?)`/g,"<code>$1</code>").replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noreferrer">$1</a>')}
function renderMarkdown(md,node){
  if(!md.trim()){const kids=node.children.map(id=>CORPUS[docIndex].nodes.find(n=>n.id===id));return '<h4>子主题</h4><ul>'+kids.map(k=>'<li>'+inline(k.title)+'</li>').join("")+'</ul>'}
  const lines=md.split("\n"), out=[];let list=null,table=[],fence=false,code=[];
  const flushList=()=>{if(list){out.push("<"+list.type+">"+list.items.map(x=>"<li>"+inline(x)+"</li>").join("")+"</"+list.type+">");list=null}};
  const flushTable=()=>{if(table.length>=2){const rows=table.filter((_,i)=>i!==1).map(r=>r.split("|").slice(1,-1).map(x=>x.trim()));out.push('<div class="table-wrap"><table>'+rows.map((r,i)=>"<tr>"+r.map(c=>"<"+(i?"td":"th")+">"+inline(c)+"</"+(i?"td":"th")+">").join("")+"</tr>").join("")+"</table></div>")}table=[]};
  for(const raw of lines){const line=raw.trim();
    if(line.startsWith("```")){flushList();flushTable();if(fence){out.push("<pre><code>"+escapeHtml(code.join("\n"))+"</code></pre>");code=[]}fence=!fence;continue}
    if(fence){code.push(raw);continue}
    if(/^\|.*\|$/.test(line)){flushList();table.push(line);continue}else flushTable();
    const bullet=line.match(/^[-*]\s+(.+)/), ordered=line.match(/^\d+\.\s+(.+)/);
    if(bullet||ordered){const type=ordered?"ol":"ul";if(!list||list.type!==type){flushList();list={type,items:[]}}list.items.push((bullet||ordered)[1]);continue}else flushList();
    if(!line)continue;
    if(/^#{3,4}\s/.test(line)){out.push("<h4>"+inline(line.replace(/^#+\s/,""))+"</h4>")}
    else if(/^>\s?/.test(line)){out.push("<p>"+inline(line.replace(/^>\s?/,""))+"</p>")}
    else out.push("<p>"+inline(line)+"</p>");
  }flushList();flushTable();return out.join("");
}
function highlight(s){if(!query)return escapeHtml(s);const i=s.toLowerCase().indexOf(query.toLowerCase());if(i<0)return escapeHtml(s);return escapeHtml(s.slice(0,i))+"<mark>"+escapeHtml(s.slice(i,i+query.length))+"</mark>"+escapeHtml(s.slice(i+query.length))}

function nodePath(node){const d=CORPUS[docIndex], parts=[];let n=node;while(n){parts.unshift(n);n=d.nodes.find(x=>x.id===n.parent)}return parts}
function selectNode(node,fromSearch=false){if(node.doc&&node.doc.id!==CORPUS[docIndex].id)docIndex=+node.doc.id;const d=CORPUS[docIndex];selected=d.nodes.find(n=>n.id===node.id)||node;depthLevel=Math.max(depthLevel,selected.level);document.querySelectorAll("#depth button").forEach(b=>b.classList.toggle("active",+b.dataset.depth===depthLevel));title.textContent=d.title;renderDocs();level.textContent="H"+selected.level+" · "+(selected.level===1?"文档":selected.level===2?"章节":selected.level===3?"主题":"细节");nodeTitle.innerHTML=highlight(selected.title);path.innerHTML=nodePath(selected).map(n=>highlight(stripNumber(n.title))).join(" / ");content.innerHTML=renderMarkdown(selected.body,selected);meta.textContent="来源 "+d.file+" · 第 "+selected.line+" 行 · "+selected.children.length+" 个子节点";inspector.classList.add("open");scope.innerHTML='当前上下文<b>'+escapeHtml(stripNumber(selected.title))+'</b>';if(fromSearch)results.classList.remove("open");resetChat();draw()}
function searchAll(q){query=q.trim();if(!query){results.classList.remove("open");searchCount.textContent="";draw();return}const nq=query.toLowerCase();const hits=allNodes.map(n=>{const t=n.title.toLowerCase(),clean=stripNumber(n.title).toLowerCase(),body=n.body.toLowerCase();let score=0,type="";if(t===nq)score=4,type="标题精确";else if(clean===nq)score=3.8,type="标题精确";else if(t.includes(nq))score=3,type="标题";else if(body.includes(nq))score=1,type="正文";return score?{...n,score,type}:null}).filter(Boolean).sort((a,b)=>b.score-a.score||a.level-b.level);searchCount.textContent=hits.length+" 条";results.classList.add("open");results.innerHTML=hits.length?hits.slice(0,50).map((h,i)=>'<button class="result" data-hit="'+i+'"><strong>'+highlight(h.title)+'</strong><small>'+escapeHtml(h.doc.title)+" · H"+h.level+" · "+h.type+'</small></button>').join(""):'<div class="empty">没有结果。试试更短的词，例如“深蹲”“恢复”“RIR”。</div>';results.querySelectorAll(".result").forEach((b)=>b.onclick=()=>selectNode(hits[+b.dataset.hit],true));draw()}

function resize(){const r=canvas.getBoundingClientRect(),dpr=Math.min(devicePixelRatio||1,2);canvas.width=r.width*dpr;canvas.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);draw()}
function world(){const r=canvas.getBoundingClientRect();return {w:r.width,h:r.height,cx:r.width/2+pan.x,cy:r.height/2+pan.y}}
function buildLayout(){const d=CORPUS[docIndex], {w,h,cx,cy}=world(), base=Math.min(w,h)*.21*scale;layout=[];const visible=d.nodes.filter(n=>n.level<=depthLevel);const h2=visible.filter(n=>n.level===2),h3=visible.filter(n=>n.level===3),h4=visible.filter(n=>n.level===4);
  layout.push({node:d.nodes[0],x:cx,y:cy,r:46*scale,kind:"root"});
  h2.forEach((n,i)=>{const a=(Math.PI*2*i/h2.length)-Math.PI/2;layout.push({node:n,x:cx+Math.cos(a)*base,y:cy+Math.sin(a)*base,r:12*scale,kind:"h2"})});
  h3.forEach((n,i)=>{const a=(Math.PI*2*i/h3.length)-Math.PI/2+.12;layout.push({node:n,x:cx+Math.cos(a)*base*1.55,y:cy+Math.sin(a)*base*1.25,r:9*scale,kind:"h3"})});
  h4.forEach((n,i)=>{const a=(Math.PI*2*i/h4.length)-Math.PI/2+.3;layout.push({node:n,x:cx+Math.cos(a)*base*1.92,y:cy+Math.sin(a)*base*1.52,r:6*scale,kind:"h4"})});
  CORPUS.filter((_,i)=>i!==docIndex).forEach((doc,i,arr)=>{const a=(Math.PI*2*i/arr.length)+.2;layout.push({doc,x:cx+Math.cos(a)*base*2.12,y:cy+Math.sin(a)*base*1.7,r:8*scale,kind:"sat"})})
}
function line(a,b,color="#56634e",dash=[],width=1.4,alpha=.78){ctx.save();ctx.beginPath();ctx.setLineDash(dash);ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=color;ctx.globalAlpha=alpha;ctx.lineWidth=width;ctx.stroke();ctx.restore()}
function draw(){const r=canvas.getBoundingClientRect();ctx.clearRect(0,0,r.width,r.height);buildLayout();const d=CORPUS[docIndex], root=layout[0];for(let i=1;i<layout.length;i++){const p=layout[i];if(p.node){const parent=layout.find(x=>x.node?.id===p.node.parent)||root;line(parent,p,"#56634e",[],1.45,.8)}else line(root,p,"#66745e",[5,5],1.25,.68)}
  layout.forEach(p=>{const n=p.node, match=query&&n&&(n.title.toLowerCase().includes(query.toLowerCase())||n.body.toLowerCase().includes(query.toLowerCase()));const isSel=n&&selected?.id===n.id;ctx.save();if(query&&n&&!match)ctx.globalAlpha=.15;if(p.kind==="root"){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle="#151b13";ctx.fill();ctx.strokeStyle=d.color;ctx.lineWidth=2;ctx.stroke();ctx.fillStyle=d.color;ctx.font="800 11px sans-serif";ctx.textAlign="center";ctx.fillText("FORMA",p.x,p.y-4);ctx.fillStyle="#aeb8a8";ctx.font="9px sans-serif";ctx.fillText(d.nodes.length+" NODES",p.x,p.y+13)}
    else if(p.kind==="sat"){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.doc.color;ctx.fill();if(r.width>=620){ctx.fillStyle="#899385";ctx.font="9px sans-serif";ctx.textAlign="center";ctx.fillText(p.doc.title.slice(0,8),p.x,p.y+22)}}
    else {ctx.beginPath();ctx.arc(p.x,p.y,p.r+(match||isSel?5:0),0,Math.PI*2);ctx.fillStyle=p.kind==="h4"?"#0b0e0b":d.color;ctx.fill();ctx.strokeStyle=match?"#fff":d.color;ctx.lineWidth=match||isSel?2:1;ctx.stroke();const label=stripNumber(n.title),limit=r.width<620?8:18;ctx.fillStyle=isSel||match?"#efffe0":p.kind==="h4"?"#96a291":"#a8b1a2";ctx.font=(p.kind==="h2"?"600 ":"")+"9px sans-serif";ctx.textAlign=p.x<root.x?"right":"left";ctx.fillText(label.length>limit?label.slice(0,limit)+"…":label,p.x+(p.x<root.x?-13:13),p.y+3)}ctx.restore()})
}

canvas.onpointerdown=e=>{dragging=true;dragStart={x:e.clientX,y:e.clientY,pan:{...pan}};canvas.setPointerCapture(e.pointerId)}
