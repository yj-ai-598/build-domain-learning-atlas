> 目标：理解 UI 岗位的工作内容、专业术语和设计判断方式，并把这些知识转化为更精准的 vibe coding 提示词，让生成的界面更美观、更专业、更有个性。

---

## 1. UI 岗位的核心定位

UI，全称 User Interface，中文常译为用户界面设计。它关注的是用户在屏幕上看到、点击、输入、切换、阅读和反馈的一切界面表现。

### 1.1 UI 设计师主要解决什么问题

- 信息是否清晰：用户能不能一眼看懂页面在做什么。
- 操作是否顺手：按钮、表单、导航、状态反馈是否符合使用习惯。
- 视觉是否专业：版式、颜色、字体、图标、间距是否统一且有审美。
- 品牌是否被感知：产品是否有自己的气质，而不是模板感很重。
- 状态是否完整：空状态、加载中、错误、成功、禁用、悬停等是否考虑周全。
- 交付是否可实现：设计是否能被前端准确还原，是否符合组件化开发方式。

### 1.2 UI 与相邻岗位的区别

| 岗位 | 核心关注 | 典型产出 |
| --- | --- | --- |
| 产品经理 PM | 业务目标、用户需求、功能范围 | PRD、用户故事、流程图、需求说明 |
| UX 设计师 | 用户体验、任务流程、信息架构 | 用户旅程、流程图、线框图、可用性测试 |
| UI 设计师 | 界面视觉、组件、状态、交互细节 | 高保真稿、设计系统、标注、切图、原型 |
| 视觉设计师 | 品牌表达、海报、活动、营销视觉 | KV、Banner、品牌视觉、运营物料 |
| 前端工程师 | 界面实现、交互逻辑、性能和适配 | 页面代码、组件、动效实现、接口联调 |

### 1.3 在 vibe coding 中最有用的 UI 思维

写提示词时，不要只说“做一个好看的页面”，而要同时描述：

- 产品类型：SaaS、社交、工具、商城、教育、金融、游戏、内容社区等。
- 用户人群：新手、专业用户、运营人员、学生、设计师、开发者、管理者等。
- 使用场景：高频操作、数据浏览、沉浸阅读、快速决策、创作编辑、移动端碎片化使用等。
- 页面目标：转化、浏览、对比、编辑、监控、提交、探索、管理等。
- 视觉气质：克制、专业、活泼、先锋、温暖、科技、精致、复古、实验性等。
- 组件和状态：导航、表格、卡片、表单、弹窗、筛选器、空状态、加载、错误、成功反馈等。

---

## 2. UI 工作流程

### 2.1 需求理解

UI 设计不是从画页面开始，而是先理解页面为什么存在。

需要明确：

- 这个页面服务什么业务目标。
- 用户来到这个页面要完成什么任务。
- 用户最关心的信息是什么。
- 哪些内容必须优先展示。
- 哪些功能是高频操作，哪些是低频操作。
- 有没有品牌、技术、平台或合规限制。

常用术语：

- 业务目标：产品希望通过页面达成的结果。
- 用户目标：用户打开页面真正想完成的事。
- 核心路径：用户完成主要任务的关键流程。
- 使用场景：用户在什么时间、设备、状态下使用产品。
- 优先级：信息或功能的重要程度排序。

### 2.2 信息架构

信息架构决定页面内容如何组织、分组、排序。

常见设计动作：

- 梳理页面层级。
- 区分主信息、辅助信息和操作信息。
- 把相关内容放在一起。
- 减少用户理解成本。
- 设计导航、分组、筛选、搜索和面包屑。

常用术语：

- IA：Information Architecture，信息架构。
- 层级：信息从重要到次要的组织关系。
- 导航：帮助用户切换页面或模块的结构。
- 面包屑：显示当前位置路径的导航。
- 标签体系：用分类、状态、属性帮助用户理解内容。
- 渐进披露：先展示关键内容，复杂信息按需展开。

### 2.3 线框图

线框图关注结构，不强调最终视觉。

常见作用：

- 快速确认页面布局。
- 讨论信息优先级。
- 避免过早陷入颜色和风格。
- 让产品、设计、开发快速对齐。

常用术语：

- Wireframe：线框图。
- Low-fi：低保真。
- Mid-fi：中保真。
- Layout：布局。
- Placeholder：占位内容。
- User flow：用户流程。

### 2.4 高保真设计

高保真设计接近最终上线效果。

重点包括：

- 颜色、字体、图标、图片风格。
- 组件样式和布局细节。
- 交互状态。
- 响应式适配。
- 品牌气质。
- 设计规范一致性。

常用术语：

- Hi-fi：高保真。
- Visual design：视觉设计。
- Design system：设计系统。
- UI kit：界面组件库。
- Component：组件。
- Variant：组件变体。
- Token：设计变量。

### 2.5 原型与交互说明

原型用于表达页面之间如何跳转、元素如何反馈。

常见内容：

- 点击按钮后发生什么。
- 表单提交成功或失败怎么显示。
- 弹窗、抽屉、菜单如何出现和关闭。
- 列表为空、加载中、错误时是什么样。
- hover、active、focus、disabled 等状态。

常用术语：

- Prototype：原型。
- Interaction：交互。
- Transition：转场。
- Micro-interaction：微交互。
- State：状态。
- Feedback：反馈。
- Motion：动效。

### 2.6 设计交付

设计交付是把设计准确传递给开发。

常见交付物：

- 高保真页面。
- 组件规范。
- 标注和间距。
- 图标、图片、插画资源。
- 状态说明。
- 响应式规则。
- 设计系统文档。

常用术语：

- Handoff：设计交付。
- Spec：规格说明。
- Redline：标注。
- Asset：设计资源。
- Slice：切图。
- Export：导出。
- Inspect：检查设计属性。

## 3. UI 设计能力地图

## 3.1 版式与布局

版式决定页面的秩序感。

关键概念：

- Grid：栅格系统。
- Column：列。
- Gutter：列间距。
- Margin：外边距。
- Padding：内边距。
- Spacing：间距。
- Alignment：对齐。
- Hierarchy：视觉层级。
- Density：信息密度。
- Whitespace：留白。

vibe coding 提示词示例：

\`\`\`md
请设计一个面向 B 端运营人员的数据看板，使用 12 栅格布局，信息密度中高，导航和筛选区域保持紧凑，核心指标区突出层级，表格区域便于横向对比，整体留白克制但不拥挤。
\`\`\`

## 3.2 色彩系统

色彩不只是“好看”，还承担品牌、层级和状态表达。

关键概念：

- Primary color：主色。
- Secondary color：辅助色。
- Accent color：强调色。
- Neutral color：中性色。
- Semantic color：语义色。
- Contrast：对比度。
- Saturation：饱和度。
- Brightness：明度。
- Color token：颜色变量。

常见语义色：

- Success：成功，常见为绿色。
- Warning：警告，常见为黄色或橙色。
- Error / Danger：错误或危险，常见为红色。
- Info：信息提示，常见为蓝色。
- Disabled：禁用，常见为低对比灰色。

vibe coding 提示词示例：

\`\`\`md
请使用冷静专业但不死板的配色：低饱和中性色作为背景，清晰的主色用于关键操作，成功、警告、错误状态使用语义色区分，整体避免大面积渐变和模板化科技蓝。
\`\`\`

## 3.3 字体与排版

字体系统影响专业感、可读性和品牌气质。

关键概念：

- Typography：字体排版。
- Font family：字体族。
- Font size：字号。
- Font weight：字重。
- Line height：行高。
- Letter spacing：字间距。
- Text hierarchy：文本层级。
- Readability：可读性。
- Truncation：文本截断。

常见文本层级：

- Display：展示级标题。
- H1 / H2 / H3：页面标题和模块标题。
- Body：正文。
- Caption：辅助说明。
- Label：表单或组件标签。
- Metadata：时间、来源、状态等元信息。

vibe coding 提示词示例：

\`\`\`md
请建立清晰的字体层级：页面标题沉稳有力量，模块标题紧凑，正文保证阅读舒适，辅助信息降低视觉权重；避免所有文字大小接近导致页面没有重点。
\`\`\`

## 3.4 组件设计

组件是 UI 的基本单位。现代界面通常不是一张张独立页面，而是由可复用组件组合而成。

常见组件：

- Button：按钮。
- Input：输入框。
- Select：选择器。
- Checkbox：复选框。
- Radio：单选框。
- Switch：开关。
- Slider：滑块。
- Tabs：标签页。
- Dropdown：下拉菜单。
- Tooltip：悬浮提示。
- Modal：弹窗。
- Drawer：抽屉。
- Toast：轻提示。
- Card：卡片。
- Table：表格。
- List：列表。
- Badge：徽标。
- Tag：标签。
- Avatar：头像。
- Progress：进度条。
- Skeleton：骨架屏。
- Empty state：空状态。

组件状态：

- Default：默认。
- Hover：悬停。
- Active：按下或激活。
- Focus：聚焦。
- Selected：选中。
- Disabled：禁用。
- Loading：加载。
- Error：错误。
- Success：成功。

vibe coding 提示词示例：

\`\`\`md
请补全组件的关键状态，包括默认、悬停、聚焦、禁用、加载、错误和成功反馈。按钮、输入框、筛选器、表格行和弹窗都需要有一致的交互状态，不要只做静态页面。
\`\`\`

## 3.5 图标、图片与插画

视觉资产决定界面的识别度和情绪。

关键概念：

- Iconography：图标体系。
- Illustration：插画。
- Image treatment：图片处理方式。
- Aspect ratio：宽高比。
- Cropping：裁切。
- Empty illustration：空状态插画。
- Visual metaphor：视觉隐喻。

判断标准：

- 图标是否统一线宽和风格。
- 图片是否服务内容，而不是随意装饰。
- 插画是否符合产品气质。
- 视觉资产是否影响信息阅读。

vibe coding 提示词示例：

\`\`\`md
请使用统一线性图标体系，线宽一致，图标只用于辅助识别和操作提示。图片区域需要真实呈现产品内容，不使用泛泛的装饰插画或无意义背景图。
\`\`\`

## 3.6 交互与反馈

优秀 UI 不只是静态好看，还要让用户知道每一步发生了什么。

关键概念：

- Affordance：可供性，元素看起来是否可操作。
- Feedback：反馈。
- Loading state：加载状态。
- Empty state：空状态。
- Error state：错误状态。
- Confirmation：确认。
- Undo：撤销。
- Validation：校验。
- Progressive disclosure：渐进披露。

vibe coding 提示词示例：

\`\`\`md
请为页面设计完整反馈机制：数据加载时显示骨架屏，空数据时给出清晰空状态和下一步操作，提交错误时在对应字段旁展示校验信息，危险操作需要二次确认，并支持操作成功后的轻提示。
\`\`\`

## 3.7 响应式与适配

响应式设计让界面在不同屏幕上都可用。

关键概念：

- Responsive design：响应式设计。
- Breakpoint：断点。
- Mobile first：移动优先。
- Adaptive layout：自适应布局。
- Fluid layout：流式布局。
- Safe area：安全区域。
- Touch target：触控热区。

常见断点：

- Mobile：手机。
- Tablet：平板。
- Desktop：桌面。
- Wide screen：宽屏。

vibe coding 提示词示例：

\`\`\`md
请实现响应式布局：桌面端使用侧边导航和多列内容区，平板端减少列数，移动端改为底部导航和单列布局。触控元素需要足够大，文本不能溢出或互相遮挡。
\`\`\`

## 3.8 可访问性

可访问性让更多用户能顺利使用产品，也是专业 UI 的重要标准。

关键概念：

- Accessibility / A11y：可访问性。
- Contrast ratio：对比度。
- Keyboard navigation：键盘导航。
- Focus ring：聚焦环。
- Screen reader：屏幕阅读器。
- Alt text：替代文本。
- ARIA：辅助技术属性。

vibe coding 提示词示例：

\`\`\`md
请保证基础可访问性：文本和背景有足够对比度，所有交互元素有清晰 focus 状态，表单 label 明确，图标按钮有可读名称，页面可通过键盘完成主要操作。
\`\`\`

## 4. 常见产品类型的 UI 设计重点

## 4.1 B 端 SaaS / 后台系统

关键词：

- 专业、克制、高效、可扫描、信息密度高、批量操作、状态清晰。

设计重点：

- 表格、筛选、搜索、批量操作。
- 数据层级和状态标签。
- 清晰的导航结构。
- 稳定的组件规范。
- 少装饰，重效率。

提示词方向：

\`\`\`md
设计一个 B 端 SaaS 管理后台，整体风格克制、清晰、专业。优先保证扫描效率、表格可读性、筛选操作效率和状态表达，不做营销式大卡片布局。
\`\`\`

## 4.2 C 端 App

关键词：

- 情绪、品牌、流畅、沉浸、轻量、转化、个性。

设计重点：

- 首屏吸引力。
- 内容节奏。
- 操作路径短。
- 品牌记忆点。
- 动效和微交互。

提示词方向：

\`\`\`md
设计一个年轻化 C 端 App 首页，视觉需要有明确品牌记忆点，内容节奏轻快，核心操作突出，微交互自然，整体有个性但不牺牲可读性。
\`\`\`

## 4.3 电商 / 交易类产品

关键词：

- 转化、信任、价格、对比、促销、购买路径。

设计重点：

- 商品图清晰。
- 价格和优惠突出。
- CTA 明确。
- 评价、库存、物流、保障信息增强信任。
- 结算路径顺畅。

提示词方向：

\`\`\`md
设计一个高转化商品详情页，商品图占据强视觉位置，价格、优惠、评价和保障信息层级清楚，购买按钮始终易触达，整体风格高级可信而不是廉价促销感。
\`\`\`

## 4.4 内容社区 / 媒体产品

关键词：

- 阅读、发现、关注、互动、沉浸、内容节奏。

设计重点：

- 信息流卡片。
- 作者、时间、标签、互动数据。
- 阅读体验。
- 推荐与筛选。
- 评论和分享。

提示词方向：

\`\`\`md
设计一个内容社区的信息流页面，突出内容可读性和发现感，卡片层级清楚，作者信息、标签、互动数据不喧宾夺主，整体节奏适合长时间浏览。
\`\`\`

## 4.5 创作工具 / 编辑器

关键词：

- 专注、工具栏、快捷操作、画布、状态、可控。

设计重点：

- 清晰的工作区。
- 工具栏和属性面板。
- 快捷操作。
- 撤销、重做、保存状态。
- 不干扰创作。

提示词方向：

\`\`\`md
设计一个专业创作工具界面，画布是视觉中心，工具栏紧凑清晰，属性面板支持精细调节，界面风格安静克制，避免装饰元素干扰创作。
\`\`\`

## 5. UI 风格词库

## 5.1 专业克制

- restrained：克制的。
- clean：干净的。
- structured：结构化的。
- enterprise-grade：企业级的。
- utilitarian：实用导向的。
- high-density：高信息密度的。
- data-forward：数据优先的。

适合：

- 后台系统。
- CRM。
- 数据看板。
- 金融工具。
- 开发者工具。

## 5.2 精致高级

- premium：高级的。
- refined：精致的。
- editorial：杂志感的。
- elegant：优雅的。
- minimal：极简的。
- luxurious：奢华的。

适合：

- 品牌官网。
- 高端电商。
- 艺术、时尚、生活方式产品。

## 5.3 活泼年轻

- playful：活泼的。
- expressive：有表现力的。
- vibrant：鲜明有活力的。
- friendly：友好的。
- bold：大胆的。
- energetic：有能量的。

适合：

- 社交产品。
- 教育产品。
- 年轻消费品牌。
- 活动页。

## 5.4 科技未来

- futuristic：未来感的。
- technical：技术感的。
- immersive：沉浸式的。
- precise：精密的。
- luminous：发光感的。
- cinematic：电影感的。

适合：

- AI 产品。
- Web3。
- 数据可视化。
- 硬件官网。

注意：科技感不等于满屏蓝紫渐变。更专业的科技感通常来自清晰结构、动态数据、精密细节、材质对比和克制高光。

## 5.5 温暖人文

- warm：温暖的。
- human-centered：以人为中心的。
- soft：柔和的。
- approachable：亲近的。
- calm：平静的。
- trustworthy：可信赖的。

适合：

- 医疗健康。
- 心理服务。
- 教育。
- 亲子。
- 生活服务。

## 7. vibe coding 提示词结构

## 7.1 推荐提示词公式

\`\`\`md
请设计/实现一个【产品类型】的【页面/功能】。

目标用户是【用户人群】，主要使用场景是【使用场景】。
页面核心目标是【页面目标】。

视觉风格：请使用【风格关键词】，整体气质要【品牌/情绪描述】。
布局要求：使用【布局方式】，突出【核心信息】，弱化【次要信息】。
组件要求：包含【组件列表】，并补全【关键状态】。
交互要求：包含【反馈、动效、响应式、可访问性】。
限制条件：避免【不想要的风格或问题】。
\`\`\`

## 7.2 普通提示词 vs 专业提示词

普通提示词：

\`\`\`md
做一个好看的后台页面。
\`\`\`

专业提示词：

\`\`\`md
请设计一个面向运营团队的 B 端数据看板。页面目标是帮助用户快速查看核心指标、定位异常数据并进入详情分析。

视觉风格克制、专业、清晰，使用中性色背景和一个明确主色。布局采用左侧导航、顶部筛选区、核心指标卡片、趋势图和明细表格。信息密度中高，重点提升扫描效率。

组件需要包含日期筛选、状态筛选、指标卡、折线图、数据表格、分页、空状态、加载状态和错误状态。按钮、输入框、表格行需要有 hover、focus、disabled 状态。移动端改为单列布局，保证文本不溢出。
\`\`\`

## 7.3 个性化提示词的关键

想让界面“更有个性”，不要只说“有个性”，要描述个性来自哪里：

- 来自品牌：例如“像独立设计工作室，而不是企业模板”。
- 来自材质：例如“轻微玻璃质感、细腻阴影、真实图片质感”。
- 来自排版：例如“大标题有杂志感，正文克制，信息节奏清楚”。
- 来自色彩：例如“低饱和背景搭配一个高识别度强调色”。
- 来自动效：例如“切换时有轻微位移和透明度变化，不夸张”。
- 来自内容：例如“真实数据、真实商品图、真实头像，而不是占位符”。

## 8. 设计质量检查清单

### 8.1 基础可用性

- 页面目标是否一眼清楚。
- 主要操作是否突出。
- 信息层级是否明确。
- 用户是否知道下一步该做什么。
- 是否考虑空、加载、错误、成功状态。

### 8.2 视觉专业度

- 间距是否统一。
- 字号和字重是否形成层级。
- 颜色是否有主次和语义。
- 图标风格是否统一。
- 卡片、按钮、输入框是否属于同一套设计语言。
- 页面是否有足够呼吸感，但不松散。

### 8.3 实现完整度

- 是否支持响应式。
- 文本是否会溢出。
- 表格和列表是否有分页或滚动策略。
- 表单是否有校验。
- 操作是否有反馈。
- 组件状态是否完整。

### 8.4 个性与品牌

- 是否有明确视觉记忆点。
- 是否避免模板感。
- 是否符合产品类型和用户人群。
- 是否有一致的品牌气质。
- 是否把装饰控制在不干扰任务的范围内。

## 9. 学习路线建议

### 第一阶段：建立 UI 基础语言

重点学习：

- 布局。
- 间距。
- 字体层级。
- 色彩基础。
- 常见组件。
- 页面状态。

练习方式：

- 临摹 5 个优秀界面。
- 拆解每个页面的信息层级。
- 记录每个页面的组件和状态。
- 用专业术语重写提示词。

### 第二阶段：建立产品类型判断

重点学习：

- B 端后台。
- C 端 App。
- 电商页面。
- 内容社区。
- 创作工具。
- AI 产品。

练习方式：

- 同一个功能分别设计成 B 端、C 端、工具型、营销型。
- 比较它们在布局、颜色、信息密度和交互上的区别。

### 第三阶段：建立设计系统意识

重点学习：

- 设计 token。
- 组件库。
- 组件状态。
- 响应式规则。
- 可访问性。

练习方式：

- 为一个小产品定义颜色、字体、间距和按钮规范。
- 让多个页面使用同一套组件和风格。

### 第四阶段：建立个人审美方向

重点学习：

- 情绪板。
- 品牌人格。
- 美术指导。
- 视觉参考分析。
- 风格迁移。

练习方式：

- 建立自己的参考库。
- 给每个参考页面打标签：布局、颜色、字体、组件、情绪。
- 把“我喜欢这个”翻译成具体设计词汇。

## 2. 产品类型模板

## 2.1 B 端 SaaS 后台

\`\`\`md
请设计一个面向【岗位/团队】的 B 端 SaaS 后台页面，用于【核心业务】。

用户特点：
用户是高频使用的专业人员，更关注效率、准确性和批量处理，而不是强装饰感。

页面目标：
帮助用户快速查看【核心数据】、筛选【对象】、处理【任务】并定位异常。

布局要求：
使用左侧导航 + 顶部工具栏 + 内容工作区的经典后台结构。
信息密度中高，模块紧凑但不拥挤。
核心指标在上方，筛选区靠近数据区域，表格作为主工作区。

组件要求：
包含侧边导航、面包屑、日期筛选、搜索框、筛选器、指标卡、数据表格、状态标签、批量操作、分页、弹窗/抽屉详情。

视觉要求：
风格克制、专业、清晰、稳定。
使用中性色背景，主色只用于关键操作和当前选中状态。
表格行、按钮、输入框需要有清晰 hover、focus、disabled 和 loading 状态。

避免：
不要做成营销落地页，不要使用大面积插画、大圆角卡片堆叠或夸张渐变。
\`\`\`

适合场景：

底部导航状态清晰。

让用户快速、安全、低阻力地进入产品。

视觉要求：
页面简洁可信，品牌感明确。
表单区域层级清楚，输入框、按钮、错误提示和加载状态完整。

交互要求：
输入校验实时反馈。
提交时按钮显示 loading。

## 4. 视觉风格增强模板

## 4.1 专业克制

\`\`\`md
视觉风格请走专业克制路线：
使用清晰栅格、低饱和中性色、稳定的字号层级和统一组件。
减少装饰，强调效率、可读性和状态清晰。
适合长时间工作使用，不要做成营销感或概念感页面。
\`\`\`

## 4.2 精致高级

\`\`\`md
视觉风格请走精致高级路线：
使用更讲究的留白、细腻的字体层级、克制的高质量图片、轻微阴影和精确对齐。
整体要像成熟品牌产品，而不是模板站。
颜色不要过多，重点通过比例、材质、排版和细节体现高级感。
\`\`\`

## 4.3 活泼年轻

\`\`\`md
视觉风格请走活泼年轻路线：
可以使用更鲜明的强调色、更有节奏的卡片、更友好的图标和轻量动效。
整体要有能量和亲和力，但保持信息清晰。
避免幼稚、杂乱或过度糖果色。
\`\`\`

## 4.4 科技未来

\`\`\`md
视觉风格请走现代科技路线：
科技感来自清晰结构、精密组件、动态数据、细腻高光和状态反馈。
可以使用深浅对比、发光细节或半透明材质，但要克制。
避免大面积蓝紫渐变、模糊光斑和空洞装饰。
\`\`\`

## 4.5 温暖可信

\`\`\`md
视觉风格请走温暖可信路线：
使用柔和但不发灰的色彩、舒适字号、清晰说明和友好的反馈。
界面需要让用户感觉安心、可靠、有人情味。
适合健康、教育、生活服务或需要建立信任的产品。
\`\`\`

## 4.6 杂志感 / Editorial

\`\`\`md
视觉风格请带有 editorial 杂志感：
使用更有节奏的大标题、清晰图文比例、强弱分明的版式和高质量图片。
适合内容展示和品牌表达。
注意保持页面可用性，不要为了视觉感牺牲交互路径。
\`\`\`

## 4.7 实验性 / 个性化

\`\`\`md
视觉风格可以更实验和有个性：
允许在排版、局部色彩、卡片形态或动效上做差异化处理。
但核心操作、信息层级和文本可读性必须稳定。
个性应该服务品牌记忆点，不是随机装饰。
\`\`\`

---

## 5. 组件与状态提示词片段

## 5.1 按钮

\`\`\`md
按钮需要包含 primary、secondary、ghost、danger 四种类型。
每种按钮都需要 default、hover、active、focus、disabled、loading 状态。
主按钮只用于最关键操作，危险按钮需要视觉警示和二次确认。
\`\`\`

## 5.2 表单

\`\`\`md
表单需要按信息类型分组，label 清晰，placeholder 只作为示例而不是字段名称。
必填、选填、说明、错误、成功、禁用状态都需要完整。
字段校验要靠近对应输入项展示，不要只在页面顶部给总错误。
\`\`\`

## 5.3 表格

\`\`\`md
表格需要适合高效扫描：
表头固定或清晰，列宽合理，数字右对齐，状态使用标签，操作列保持一致。
支持排序、筛选、分页、批量选择、空状态、加载状态和错误状态。
hover 行反馈清晰，选中行有明确视觉状态。
\`\`\`

## 5.4 卡片

\`\`\`md
卡片需要有明确的信息层级：
标题、摘要、关键数据、状态、操作入口各自权重清楚。
卡片之间间距统一，圆角和阴影克制。
卡片可点击时需要 hover 和 active 状态，不可点击时不要伪装成交互元素。
\`\`\`

## 5.5 导航

\`\`\`md
导航需要让用户知道当前位置：
包含默认、悬停、选中、展开、折叠状态。
层级不要过深，当前页面高亮清楚。
移动端需要转换为底部导航、抽屉导航或顶部菜单。
\`\`\`

## 5.6 弹窗 / 抽屉

\`\`\`md
弹窗用于需要用户确认或完成短任务的场景。
抽屉用于查看详情、编辑信息或不中断上下文的操作。
弹窗和抽屉都需要标题、正文、主操作、次操作、关闭方式、加载和错误状态。
危险确认需要明确说明影响范围。
\`\`\`

## 5.7 Toast / 通知

\`\`\`md
操作反馈需要使用轻量 Toast 或通知：
成功反馈简洁明确，错误反馈说明原因，警告反馈给出下一步。
通知不要遮挡关键操作区域，也不要持续时间过长。
\`\`\`

## 5.8 加载状态

\`\`\`md
数据加载时请根据场景选择合适状态：
页面级加载使用骨架屏，按钮提交使用按钮 loading，局部内容刷新使用局部 spinner 或 skeleton。
加载状态不能导致布局大幅跳动。
\`\`\`

## 5.9 空状态

\`\`\`md
空状态需要说明：
这里为什么没有内容，用户可以做什么下一步。
包含标题、简短说明、主操作按钮。
B 端空状态保持专业，C 端空状态可以更友好。
\`\`\`

## 5.10 错误状态

\`\`\`md
错误状态需要包含：
发生了什么、可能原因、恢复操作。
如果是表单错误，请定位到字段。
如果是网络或接口错误，请提供重试。
如果是权限错误，请提供申请权限或切换账号。
\`\`\`

---

## 6. 设计系统提示词

## 6.1 小型设计系统

\`\`\`md
请先为这个界面定义一套小型设计系统，然后基于它完成页面。

设计系统需要包含：
- 颜色：主色、辅助色、中性色、语义色。
- 字体：标题、正文、辅助文字、标签。
- 间距：4/8 基础间距体系。
- 圆角：按钮、卡片、输入框统一规则。
- 阴影：只用于浮层和需要强调的卡片。
- 组件：按钮、输入框、选择器、标签、卡片、表格、弹窗。
- 状态：hover、focus、active、disabled、loading、error、success。

页面中的所有模块都必须遵循这套规则，避免样式碎片化。
\`\`\`

## 6.2 设计 Token

\`\`\`md
请使用设计 token 思维组织样式：
定义 color、typography、spacing、radius、shadow、z-index、motion 等基础变量。
组件样式引用这些变量，保证后续可以统一调整主题。
\`\`\`

## 6.3 组件库一致性

\`\`\`md
请让所有组件看起来来自同一套组件库：
按钮高度、圆角、边框、字体、图标尺寸、间距和状态反馈保持一致。
不要在不同模块中混用不同风格的卡片、按钮和输入框。
\`\`\`

---

## 7. 反向约束模板

## 7.1 避免模板感

\`\`\`md
请避免模板感：
不要使用千篇一律的渐变背景、大面积圆角卡片、无意义插画、过度阴影和泛泛的欢迎文案。
界面需要像一个真实产品，有具体内容、明确任务和完整状态。
\`\`\`

## 7.2 避免信息混乱

\`\`\`md
请避免信息混乱：
不要让所有模块视觉权重相同。
请明确主次关系，主操作突出，次要信息降低权重。
保持对齐、间距和分组一致。
\`\`\`

## 7.3 避免过度设计

\`\`\`md
请避免过度设计：
动效、阴影、渐变、插画和装饰元素都要服务功能。
如果某个视觉元素不能帮助用户理解内容或完成操作，就不要使用。
\`\`\`

## 7.4 避免移动端问题

\`\`\`md
请特别检查移动端：
按钮不能太小，文本不能溢出，卡片不能挤压，导航不能遮挡内容。
复杂表格在移动端需要改为卡片列表或横向滚动。
\`\`\`

## 7.5 避免可访问性问题

\`\`\`md
请避免可访问性问题：
文字和背景需要有足够对比度。
图标按钮需要可读名称。
表单需要 label。
交互元素需要 focus 状态。
不要只用颜色表达状态。
\`\`\`

---

## 8. 质量评审提示词

## 8.1 UI 评审

\`\`\`md
请从资深 UI 设计师角度评审这个界面：
1. 信息层级是否清楚。
2. 视觉风格是否统一。
3. 间距、对齐、字号、颜色是否专业。
4. 组件状态是否完整。
5. 响应式是否可靠。
6. 是否有模板感或过度设计。

请按严重程度列出问题，并给出具体修改建议。
\`\`\`

## 8.2 UX 评审

\`\`\`md
请从 UX 角度评审这个页面：
1. 用户目标是否能快速完成。
2. 主路径是否顺畅。
3. 操作反馈是否明确。
4. 错误恢复是否友好。
5. 是否有不必要的认知负担。

请指出最影响用户完成任务的 3 个问题，并给出优化方案。
\`\`\`

## 8.3 前端还原评审

\`\`\`md
请从前端实现和设计还原角度检查：
1. 布局是否稳定。
2. 文本是否可能溢出。
3. 组件尺寸是否一致。
4. 移动端是否可用。
5. 交互状态是否实现完整。
6. 是否存在 hover、focus、loading、empty、error 状态缺失。

请给出需要修复的代码或样式问题。
\`\`\`

## 8.4 让 AI 自我迭代

\`\`\`md
请基于当前界面继续迭代一版：
保留已经有效的结构和功能。
重点提升视觉层级、间距节奏、组件一致性和品牌个性。
不要大改业务逻辑。
请说明你改了哪些 UI 细节，以及这些改动如何提升专业度。
\`\`\`

## 9. 组合示例

## 9.1 B 端客户管理系统

\`\`\`md
请设计一个面向销售团队的 B 端客户管理系统首页。

目标用户是销售经理和一线销售，他们需要快速查看客户线索状态、跟进优先级和本周任务。

页面目标：
帮助用户在 5 秒内理解销售漏斗状态，并快速进入高优先级客户跟进。

页面结构：
左侧导航、顶部搜索与个人区、核心 KPI、销售漏斗图、待跟进列表、客户表格、快捷新建客户按钮。

视觉风格：
专业克制、清晰、高效，信息密度中高。
使用中性色背景和一个稳定主色，状态标签使用语义色。

组件要求：
包含导航、搜索、筛选、指标卡、图表、表格、状态标签、批量操作、抽屉详情、空状态、加载状态和错误状态。

交互要求：
表格行支持 hover，客户详情使用右侧抽屉打开。
筛选条件变化后有局部 loading。
危险操作需要二次确认。

响应式：
桌面端是后台布局，移动端改为单列卡片列表。

避免：
不要做成营销官网，不要使用过度插画或大面积渐变。
\`\`\`

## 9.2 AI 写作工具

\`\`\`md
请设计一个 AI 写作工具的主界面。

目标用户是内容创作者和运营人员，他们希望快速输入主题、生成文案、比较版本并继续编辑。

页面目标：
让用户清楚知道输入什么、AI 正在做什么、结果在哪里、下一步能怎么处理。

布局：
左侧是历史记录和模板分类。
中间是 prompt 输入区和生成结果。
右侧是参数设置和版本对比。

视觉风格：
现代、可信、轻量、有一点智能感。
科技感来自精密组件、清晰状态和流式生成反馈，不使用大面积蓝紫渐变。

组件：
prompt 输入框、模板选择、语气选择、长度滑块、生成按钮、结果卡片、复制、重新生成、保存、历史列表、加载状态、错误状态。

交互：
生成中显示流式文本和停止按钮。
生成失败提供重试。
结果支持复制、收藏、继续编辑和生成变体。
\`\`\`

## 9.3 健康管理 App

\`\`\`md
请设计一个健康管理 App 首页。

目标用户是希望建立长期健康习惯的普通用户。

页面目标：
让用户快速查看今日身体状态、任务完成度和下一步建议。

页面结构：
顶部显示问候和今日状态。
核心区域显示健康评分、睡眠、运动、饮水和心率摘要。
下方显示今日建议、习惯打卡和近期趋势。
底部导航包含首页、记录、计划、我的。

视觉风格：
温暖、可信、平静、轻量。
使用柔和色彩、清晰数据卡片和友好的微交互。

交互：
打卡后有成功反馈。
异常指标需要温和提醒。
数据加载时显示骨架屏。
空数据时引导用户完成第一次记录。
\`\`\`

## 9.4 高端家居品牌官网

\`\`\`md
请设计一个高端家居品牌官网首页。

目标：
让用户快速感知品牌审美、查看代表产品，并进入预约咨询或查看系列。

首屏：
必须呈现真实家居场景或产品图。
H1 使用品牌名或具体品类，副标题说明品牌价值。
主 CTA 是预约咨询，次 CTA 是查看系列。

视觉风格：
精致、高级、克制、杂志感。
使用大图、清晰留白、细腻字体层级和低饱和色彩。

页面结构：
首屏、精选系列、设计理念、空间案例、材料工艺、预约咨询。

避免：
不要使用无意义抽象渐变，不要把首屏做成左右卡片模板。
\`\`\`

## 2. B 端产品案例

## 2.1 CRM 客户管理首页

\`\`\`md
请设计并实现一个面向销售团队的 CRM 客户管理首页。

产品背景：
这是一个帮助销售团队管理线索、客户、商机和跟进任务的 B 端 SaaS 系统。

目标用户：
销售经理和一线销售。他们每天高频使用，需要快速判断哪些客户最值得跟进。

页面目标：
让用户在 5 秒内看清今日销售状态、重点商机、待跟进客户和异常风险。

信息结构：
1. 左侧导航：工作台、客户、线索、商机、任务、报表、设置。
2. 顶部栏：全局搜索、日期范围、通知、个人信息。
3. 核心指标：新增线索、有效客户、商机金额、成交率。
4. 销售漏斗：展示从线索到成交的转化。
5. 待跟进列表：按照优先级排序。
6. 客户表格：显示客户名称、阶段、负责人、最近跟进、下一步操作。

视觉方向：
专业、克制、清晰、高效。
使用中性色背景，主色用于当前导航、关键操作和选中状态。
状态标签使用语义色，但整体不要花。

组件要求：
包含侧边导航、顶部搜索、日期筛选、指标卡、漏斗图、表格、状态标签、批量操作、右侧抽屉详情、分页。

状态要求：
表格行需要 hover 和 selected 状态。
搜索和筛选需要 loading 状态。
空列表需要引导创建客户。
删除和转移客户需要二次确认。

响应式：
桌面端使用侧边导航和表格。
移动端将客户表格改为卡片列表，导航改为底部导航或抽屉菜单。

避免：
不要做成营销官网。
不要使用大面积渐变、装饰插画或过大圆角卡片。
\`\`\`

## 2.2 项目管理看板

\`\`\`md
请设计一个 B 端项目管理看板，用于团队查看项目进度、任务状态和风险。

目标用户：
项目经理、设计师、开发者和运营人员。

页面目标：
帮助用户快速理解项目进度，定位延期任务，并完成任务分配或状态更新。

页面结构：
顶部展示项目名称、项目状态、成员头像、时间范围和主操作按钮。
主体区域使用看板布局，分为待处理、进行中、待验收、已完成。
右侧或抽屉展示任务详情，包括负责人、截止时间、优先级、描述、评论和附件。

视觉方向：
清晰、协作感、轻量工具感。
任务卡片信息层级明确，优先级和截止时间突出但不刺眼。

组件要求：
看板列、任务卡片、成员头像、优先级标签、截止日期、评论数量、拖拽反馈、任务详情抽屉、筛选器。

交互要求：
任务卡片支持拖拽变更状态。
拖拽时需要有明确占位和反馈。
任务过期时给出温和但清楚的警示。
评论提交、附件上传和状态变更需要成功或失败反馈。

避免：
不要让每个任务卡片都像独立广告卡片。
不要使用过多颜色导致看板难以扫描。
\`\`\`

## 2.3 财务数据看板

\`\`\`md
请设计一个企业财务数据看板，用于管理层查看收入、成本、利润和现金流。

目标用户：
财务负责人、业务负责人和公司管理层。

页面目标：
让用户快速判断公司财务健康度，并发现异常波动。

首屏展示总收入、总成本、毛利率、净利润、现金流余额。

第三层展示异常项列表和明细表格。

视觉方向：
可信、严谨、数据优先、低干扰。
颜色使用克制，正向指标和风险指标语义明确。
数字展示需要清晰，金额和百分比格式统一。

组件要求：
KPI 卡片、折线图、柱状图、饼图或环图、异常标签、明细表格、筛选器、导出按钮。

交互要求：
图表 hover 显示 tooltip。
点击异常项可打开详情抽屉。
筛选条件变化时局部加载。
导出报表按钮需要 loading 和成功反馈。

## 3.2 学习 App 课程详情页

\`\`\`md
请设计一个在线学习 App 的课程详情页。

目标用户：
希望利用碎片时间学习技能的学生和职场新人。

页面目标：
帮助用户判断课程是否值得学习，并快速开始第一节课。

信息层级：
第一层：课程封面、课程名、讲师、评分、学习人数、开始学习按钮。
第二层：课程亮点、适合人群、学习收获。
第三层：课程目录、评价、讲师介绍、相关推荐。

视觉方向：
清晰、有动力、可信、不过度营销。
课程封面和课程标题需要有吸引力，但购买或学习路径更重要。

组件要求：
课程封面、评分、标签、CTA 按钮、目录列表、进度状态、评价卡片、讲师卡片、收藏按钮。

交互要求：
已学习课程显示学习进度和继续学习按钮。
未购买课程显示试看和购买入口。
目录支持展开收起。
移动端底部固定主要 CTA。

避免：
不要让促销信息压过课程价值。
不要使用大量花哨装饰影响阅读。
\`\`\`

## 3.3 内容社区个人主页

\`\`\`md
请设计一个内容社区的个人主页。

目标用户：
内容创作者和访问其主页的读者。

页面目标：
展示创作者的身份、内容风格、代表作品和互动数据，并引导关注。

页面结构：
顶部个人信息区：头像、昵称、简介、标签、关注按钮、数据概览。
中部内容分类：作品、收藏、动态、关于。
主体内容：瀑布流或卡片列表展示代表内容。
底部或侧边展示热门标签和近期活动。

视觉方向：
有个性、内容优先、轻社交感。
个人品牌可以通过头像、封面、标签和排版体现。

组件要求：
头像、封面图、关注按钮、数据指标、标签页、内容卡片、点赞收藏评论、空状态。

交互要求：
关注按钮需要状态变化。
内容卡片 hover 或点击反馈清晰。
移动端封面和个人信息不能遮挡内容。

避免：
不要让封面图过高导致首屏看不到内容。
不要把所有信息都挤在头部。
\`\`\`

---

## 4. 电商产品案例

## 4.1 高端护肤品商品详情页

\`\`\`md
请设计一个高端护肤品商品详情页。

目标用户：
关注成分、效果、质感和品牌可信度的消费者。

页面目标：
提升用户对产品功效和品牌的信任，并引导购买。

信息层级：
首屏展示产品高清图、产品名、核心功效、价格、规格、评分和购买按钮。
第二层展示核心成分、适合肤质、使用方法和真实评价。
第三层展示品牌故事、实验数据、搭配推荐和售后保障。

视觉方向：
精致、高级、干净、可信。
使用高质量产品图和留白，颜色低饱和，文字层级细腻。

组件要求：
图片轮播、规格选择、数量选择、价格区、评价摘要、功效标签、加入购物车、立即购买、收藏、客服入口。

交互要求：
规格未选时提醒用户选择。
加入购物车有成功反馈。
移动端底部固定购买栏。
评价区支持筛选。

避免：
不要做成廉价促销风。
不要用过多闪烁标签和大红大黄促销色。
\`\`\`

## 4.2 潮流服饰列表页

\`\`\`md
请设计一个潮流服饰电商的商品列表页。

目标用户：
年轻消费者，希望快速发现喜欢的款式并筛选尺码、价格和风格。

页面目标：
提升商品浏览效率和点击转化。

页面结构：
顶部为品牌导航、搜索和购物车。
下方是分类、筛选和排序。
主体使用商品网格，展示图片、品牌、名称、价格、颜色、标签和收藏。

视觉方向：
年轻、利落、有街头感，但保持商品图清晰。
商品图片是主视觉，界面装饰要克制。

组件要求：
筛选抽屉、排序菜单、商品卡片、颜色 swatch、尺码筛选、价格滑块、收藏按钮、加载更多。

交互要求：
筛选条件需要可清除。
商品卡片 hover 显示快捷加购或查看详情。
移动端筛选使用底部抽屉。

避免：
不要让背景或装饰抢走商品图注意力。
不要让筛选项隐藏过深。
\`\`\`

## 4.3 购物车 / 结算页

\`\`\`md
请设计一个电商购物车和结算页面。

目标用户：
已经有购买意图的用户。

页面目标：
让用户确认商品、优惠、配送和支付信息，并顺利完成下单。

信息层级：
第一层：商品清单、总价、优惠、结算按钮。
第二层：地址、配送方式、支付方式、发票。
第三层：优惠券、积分、售后保障和客服。

视觉方向：
清晰、可信、低干扰。
结算路径要短，价格计算透明。

组件要求：
商品列表、数量选择器、优惠券、地址卡片、支付方式、订单摘要、确认按钮、错误提示。

交互要求：
数量变化后价格即时更新。
库存不足明确提示。
优惠券不可用时说明原因。
提交订单时显示 loading。
支付失败时提供重试和更换支付方式。

避免：
不要在结算页加入太多推荐商品干扰主路径。
\`\`\`

---

## 5. AI 产品案例

## 5.1 AI 写作工作台

\`\`\`md
请设计一个 AI 写作工具的主工作台。

目标用户：
内容运营、博主、市场人员和自由创作者。

页面目标：
让用户输入写作需求，选择模板和语气，生成可编辑结果，并保存不同版本。

页面结构：
左侧：历史记录、模板分类、收藏。
中间：prompt 输入区、生成结果区、编辑器。
右侧：参数设置、语气、长度、目标平台、版本对比。

视觉方向：
现代、可信、专注、有一点智能感。
科技感来自清晰结构、流式生成、精密控件和状态反馈，不依赖大面积渐变。

组件要求：
prompt 输入框、模板卡片、参数选择、生成按钮、停止按钮、结果卡片、编辑器、版本列表、复制、保存、重新生成。

交互要求：
生成中显示流式文本。
支持停止生成。
生成失败提供原因和重试。
结果支持复制、编辑、收藏和生成变体。

避免：
不要让输入区和结果区层级混乱。
不要使用空洞的 AI 球体或抽象装饰占据主要区域。
\`\`\`

## 5.2 AI 图片生成器

\`\`\`md
请设计一个 AI 图片生成器界面。

目标用户：
设计师、内容创作者和电商运营。

页面目标：
帮助用户输入画面描述，调整风格参数，生成图片，并管理结果。

页面结构：
左侧是 prompt、反向 prompt、尺寸、风格、数量、模型和高级参数。
中间是生成结果画廊。
右侧是选中图片详情、放大、下载、再次生成和历史版本。

视觉方向：
创作工具感、沉浸、专业、灵活。
图片结果是视觉中心，控制面板保持紧凑。

组件要求：
多行 prompt 输入、风格标签、尺寸选择、滑块、生成按钮、图片网格、图片预览、下载、收藏、历史记录。

交互要求：
生成中显示进度和占位。
失败时保留用户输入并允许重试。
图片 hover 展示操作按钮。
选中图片后显示详情面板。

避免：
不要让参数面板过度抢眼。
不要用低质量占位图模拟结果。
\`\`\`

## 5.3 AI 数据分析助手

\`\`\`md
请设计一个 AI 数据分析助手界面。

目标用户：
运营、产品经理和业务分析人员。

页面目标：
让用户上传数据、提问、获得图表和结论，并继续追问。

页面结构：
顶部显示数据源、更新时间和导出按钮。
左侧是数据表和字段列表。
中间是对话和分析结果。
右侧是自动生成的图表、洞察和建议。

视觉方向：
专业、可信、数据优先、智能辅助。
AI 的存在要帮助解释数据，而不是抢走工作区。

组件要求：
文件上传、字段列表、聊天输入框、图表卡片、洞察卡片、建议操作、导出按钮、错误状态。

交互要求：
上传中显示进度。
分析中显示步骤状态。
结果需要支持追问、复制和导出。
如果数据格式错误，需要明确说明修复方式。

避免：
不要只做聊天界面，要体现数据分析工作流。
\`\`\`

## 6. 案例改写练习

- 把行业换掉：CRM 改成招聘管理、库存管理、审批系统。
- 把用户换掉：专业用户改成新手用户。
- 把风格换掉：专业克制改成温暖可信或精致高级。
- 把设备换掉：桌面端改成移动端。
- 把核心操作换掉：查看改成编辑、购买、生成、审核。

`,S0=`# 常见组件设计规范

> 用途：理解常见 UI 组件应该如何设计、包含哪些状态、适合什么场景，以及在 vibe coding 提示词中如何描述。

---

## 1. 组件设计的基本原则

### 1.1 组件不是装饰

组件的价值是让用户完成操作、理解状态、浏览信息。一个组件是否合格，优先看它是否解决问题，而不是看它是否“炫”。

### 1.2 组件必须有状态

常见状态：

- Default：默认。
- Hover：悬停。
- Active：按下。
- Focus：键盘聚焦。
- Selected：选中。
- Disabled：禁用。
- Loading：加载中。
- Error：错误。
- Success：成功。
- Empty：空状态。

### 1.3 组件需要一致性

需要统一：

- 高度。
- 圆角。
- 字号。
- 图标尺寸。
- 内边距。
- 边框。
- 阴影。
- 颜色语义。
- 动效时长。

---

## 2. Button 按钮

### 2.1 使用场景

按钮用于触发明确操作，例如提交、保存、创建、删除、导出、继续。

### 2.2 类型

| 类型 | 用途 |
| --- | --- |
| Primary | 页面最重要操作 |
| Secondary | 次要操作 |
| Ghost / Text | 低权重操作 |
| Danger | 删除、撤销、清空等危险操作 |
| Icon button | 工具栏操作或空间有限场景 |

### 2.3 设计规范

- 一个区域通常只保留一个 Primary Button。
- 危险按钮需要明显区分，并配合确认。
- 按钮文案使用动词，例如“保存”“创建客户”“导出报表”。
- 图标按钮需要 tooltip 或可访问名称。
- Loading 时防止重复提交。

### 2.4 必备状态

- Default。
- Hover。
- Active。
- Focus。
- Disabled。
- Loading。

### 2.5 提示词片段

\`\`\`md
按钮需要包含 primary、secondary、ghost、danger 和 icon button。
每种按钮都需要 default、hover、active、focus、disabled、loading 状态。
主按钮只用于当前页面最关键操作，危险按钮需要二次确认。
\`\`\`

---

## 3. Input 输入框

### 3.1 使用场景

用于输入文本、数字、邮箱、密码、搜索关键词、备注等。

### 3.2 结构

- Label。
- Input field。
- Placeholder。
- Helper text。
- Error message。
- Prefix / Suffix icon。
- Clear button。

### 3.3 设计规范

- Label 不要只放在 placeholder 中。
- Placeholder 用于示例，不用于替代字段名。
- 错误提示靠近对应字段。
- 密码输入需要显示/隐藏切换。
- 搜索输入可提供清除按钮。

### 3.4 必备状态

- Default。
- Hover。
- Focus。
- Filled。
- Disabled。
- Error。
- Success。

### 3.5 提示词片段

\`\`\`md
输入框需要有明确 label、示例 placeholder、辅助说明和错误提示。
错误信息靠近对应字段展示，focus 状态清楚，禁用状态降低视觉权重。
\`\`\`

---

## 4. Select / Dropdown 选择器

### 4.1 使用场景

用于从一组选项中选择一个或多个值，例如状态、分类、地区、负责人。

### 4.2 类型

- Single select：单选。
- Multi select：多选。
- Searchable select：可搜索。
- Cascader：级联选择。
- Dropdown menu：操作菜单。

### 4.3 设计规范

- 选项数量少时可用 radio，数量多时用 select。
- 多选结果需要可清除。
- 长选项需要截断或换行策略。
- 下拉层不能被页面边界裁掉。

### 4.4 必备状态

- Default。
- Open。
- Hover option。
- Selected。
- Disabled option。
- Empty result。
- Loading options。

### 4.5 提示词片段

\`\`\`md
选择器需要支持打开、选中、禁用、搜索无结果和加载状态。
多选时显示已选标签，并支持单个移除和一键清空。
\`\`\`

---

## 5. Checkbox / Radio / Switch

### 5.1 Checkbox

适合多选、批量选择、勾选协议、开启某组选项。

必备状态：

- Unchecked。
- Checked。
- Indeterminate。
- Disabled。
- Focus。

### 5.2 Radio

适合互斥选项，用户只能选一个。

设计重点：

- 选项数量不要过多。
- 文案要明确差异。
- 默认选项要谨慎。

### 5.3 Switch

适合立即生效的开关，例如通知开关、显示隐藏、启用停用。

设计重点：

- 不适合用于复杂提交型表单。
- 开关文案要说明开和关的含义。
- 变更失败时要回滚并提示。

### 5.4 提示词片段

\`\`\`md
复选框、单选框和开关需要有 checked、unchecked、disabled、focus 状态。
Switch 用于立即生效的设置，变更失败时需要回滚并给出 Toast 提示。
\`\`\`

---

## 6. Tabs 标签页

### 6.1 使用场景

用于在同一层级下切换不同内容，例如“全部 / 待处理 / 已完成”。

### 6.2 设计规范

- Tab 数量不要过多。
- 当前选中状态必须清楚。
- 切换后内容区域不能跳动过大。
- 如果内容需要 URL 状态，建议支持路由。

### 6.3 必备状态

- Default。
- Hover。
- Active selected。
- Disabled。
- Loading content。

### 6.4 提示词片段

\`\`\`md
标签页用于同层级内容切换，当前选中项需要清晰高亮。
切换内容时保持布局稳定，并为加载中的内容提供局部 loading。
\`\`\`

---

## 7. Table 表格

### 7.1 使用场景

适合 B 端大量结构化数据的查看、比较、筛选和批量操作。

### 7.2 结构

- Table header。
- Row。
- Cell。
- Status tag。
- Action column。
- Pagination。
- Toolbar。
- Empty state。

### 7.3 设计规范

- 数字右对齐，文本左对齐。
- 操作列位置固定。
- 状态用标签表达，不只靠颜色。
- 批量操作需要选择列。
- 表头可以支持排序和筛选。
- 长文本需要截断、tooltip 或展开策略。

### 7.4 必备状态

- Loading。
- Empty。
- Error。
- Hover row。
- Selected row。
- Sorted column。
- Disabled action。

### 7.5 提示词片段

\`\`\`md
表格需要适合高效扫描：表头清晰，数字右对齐，状态使用标签，操作列保持一致。
支持排序、筛选、分页、批量选择、空状态、加载状态和错误状态。
移动端将复杂表格改为卡片列表或横向滚动。
\`\`\`

---

## 8. Card 卡片

### 8.1 使用场景

适合展示一组独立内容，例如商品、文章、任务、指标、课程。

### 8.2 结构

- Header。
- Media / Icon。
- Title。
- Description。
- Metadata。
- Status。
- Actions。

### 8.3 设计规范

- 卡片不是所有内容的万能容器。
- 卡片内部也需要层级，不要平均用力。
- 可点击卡片需要明显 hover。
- 不可点击卡片不要做强交互暗示。
- 卡片圆角和阴影要统一。

### 8.4 必备状态

- Default。
- Hover。
- Active。
- Selected。
- Loading。
- Empty / placeholder。

### 8.5 提示词片段

\`\`\`md
卡片需要清晰区分标题、摘要、关键数据、状态和操作。
卡片可点击时提供 hover 和 active 状态，不可点击时不要做强阴影或指针暗示。
\`\`\`

---

## 9. Modal 弹窗

### 9.1 使用场景

用于需要用户立即处理的任务，例如确认、创建、短表单、危险操作。

### 9.2 结构

- Title。
- Description。
- Body。
- Primary action。
- Secondary action。
- Close button。

### 9.3 设计规范

- 不要滥用弹窗打断用户。
- 标题说明动作，正文说明影响。
- 危险操作需要明确后果。
- 弹窗内表单不宜过长。
- 关闭方式要清楚。

### 9.4 必备状态

- Open。
- Closing。
- Loading。
- Error。
- Disabled submit。

### 9.5 提示词片段

\`\`\`md
弹窗用于短任务或确认操作，需要包含标题、说明、主操作、次操作和关闭按钮。
危险操作弹窗必须说明影响范围，并提供取消入口。
\`\`\`

---

## 10. Drawer 抽屉

### 10.1 使用场景

适合在不离开当前页面的情况下查看详情、编辑信息、处理任务。

### 10.2 设计规范

- B 端详情查看优先考虑抽屉。
- 抽屉宽度要根据内容复杂度决定。
- 保存和取消按钮位置固定。
- 内容较长时需要内部滚动。

### 10.3 必备状态

- Open。
- Loading content。
- Editing。
- Unsaved changes。
- Error。

### 10.4 提示词片段

\`\`\`md
详情查看使用右侧抽屉，不打断列表上下文。
抽屉包含加载状态、编辑状态、未保存提醒、保存成功和错误反馈。
\`\`\`

---

## 11. Tooltip / Popover

### 11.1 Tooltip

用于解释图标、短说明、字段含义。

规范：

- 文案要短。
- 不放关键操作。
- 鼠标离开后消失。

### 11.2 Popover

用于展示更复杂的补充内容或轻量操作。

规范：

- 可以包含按钮或链接。
- 需要明确关闭方式。
- 位置不能遮挡关键内容。

### 11.3 提示词片段

\`\`\`md
图标按钮需要 tooltip 解释含义。
复杂说明使用 popover，内容要简洁，不遮挡主要操作。
\`\`\`

---

## 12. Toast / Message 通知

### 12.1 使用场景

用于轻量反馈，例如保存成功、复制成功、提交失败。

### 12.2 类型

- Success。
- Error。
- Warning。
- Info。

### 12.3 设计规范

- 不要遮挡关键操作。
- 文案简短明确。
- 错误类 Toast 尽量说明下一步。
- 重要通知可使用 Notification，而不是 Toast。

### 12.4 提示词片段

\`\`\`md
操作结果使用 Toast 反馈：成功反馈简洁，错误反馈说明原因并提供下一步。
Toast 不遮挡主要操作区域。
\`\`\`

---

## 13. Navigation 导航

### 13.1 类型

- Top navigation。
- Side navigation。
- Bottom navigation。
- Breadcrumb。
- Stepper。

### 13.2 设计规范

- 当前页面位置必须清楚。
- 层级不要过深。
- 导航名称使用用户能理解的业务词。
- 移动端需要转换为底部导航或抽屉。

### 13.3 必备状态

- Default。
- Hover。
- Active。
- Expanded。
- Collapsed。
- Disabled。

### 13.4 提示词片段

\`\`\`md
导航需要包含默认、悬停、选中、展开和折叠状态。
当前页面高亮清晰，移动端转换为底部导航或抽屉导航。
\`\`\`

---

## 14. Empty State 空状态

### 14.1 使用场景

列表无数据、搜索无结果、首次使用、权限不足、筛选无结果。

### 14.2 结构

- 图标或轻量插画。
- 标题。
- 原因说明。
- 主操作。
- 次操作。

### 14.3 设计规范

- 不要只写“暂无数据”。
- 需要告诉用户为什么为空、下一步做什么。
- B 端保持专业，C 端可以更友好。

### 14.4 提示词片段

\`\`\`md
空状态需要包含标题、原因说明和下一步主操作。
不要只显示“暂无数据”，需要引导用户创建、清除筛选或导入内容。
\`\`\`

---

## 15. Skeleton 骨架屏

### 15.1 使用场景

页面初次加载、列表加载、卡片内容加载、详情数据加载。

### 15.2 设计规范

- 骨架结构要接近真实内容。
- 不要让加载时布局跳动。
- 局部加载只影响局部，不要全页阻塞。

### 15.3 提示词片段

\`\`\`md
加载状态使用骨架屏，骨架结构要接近最终内容，避免加载完成后布局大幅跳动。
\`\`\`

---

## 16. 组件检查清单

- 这个组件的用途是否明确。
- 是否有完整状态。
- 是否有清晰反馈。
- 是否符合当前产品的信息密度。
- 是否和其他组件使用同一套圆角、颜色、字体和间距。
- 移动端是否仍然可用。
- 错误和空状态是否有恢复路径。
- 图标按钮是否有 tooltip 或可访问名称。

`,b0=`# 设计系统入门手册

> 用途：理解设计系统是什么、由哪些部分组成，以及如何在 vibe coding 中要求 AI 生成更统一、更专业的界面。

---

## 1. 什么是设计系统

设计系统是一套让产品界面保持一致的规则、组件和方法。它不是单纯的 UI kit，也不是一份颜色表，而是把设计语言、组件规范、交互状态和实现规则组织成可复用体系。

### 1.1 设计系统解决什么问题

- 多个页面风格不一致。
- 按钮、表单、卡片每个地方长得不一样。
- 开发不知道如何处理 hover、loading、error 等状态。
- 产品迭代后界面越来越杂。
- 设计和代码之间缺少共同语言。

### 1.2 设计系统包含什么

- Design principles：设计原则。
- Design tokens：设计变量。
- Foundations：基础规范。
- Components：组件。
- Patterns：场景模式。
- Content guidelines：文案规范。
- Accessibility：可访问性。
- Handoff rules：交付规则。

---

## 2. 设计原则

设计原则是整个系统的判断标准。

### 2.1 示例原则

#### 清晰优先

用户应该先理解信息和操作，再感受风格。

#### 一致但不僵硬

同类元素保持一致，不同业务场景允许有合理变化。

#### 状态完整

任何组件都不只存在默认状态，还要考虑加载、错误、禁用、成功等状态。

#### 内容真实

尽量使用接近真实业务的数据、文案和图片，避免占位符造成错误判断。

#### 响应式可靠

界面在桌面、平板和移动端都应保持清晰可用。

### 2.2 提示词片段

\`\`\`md
请先定义这个产品的设计原则，再基于原则生成界面。
原则需要覆盖清晰性、一致性、状态完整、响应式和品牌气质。
后续所有组件和页面都要遵循这些原则。
\`\`\`

---

## 3. Design Tokens 设计变量

Design tokens 是设计系统的基础变量，用于统一颜色、字体、间距、圆角、阴影和动效。

### 3.1 颜色 Token

常见结构：

\`\`\`md
color.primary
color.primary.hover
color.primary.active
color.neutral.background
color.neutral.surface
color.neutral.border
color.text.primary
color.text.secondary
color.text.disabled
color.success
color.warning
color.error
color.info
\`\`\`

设计建议：

- 主色只用于品牌识别、关键操作和选中状态。
- 中性色承担背景、边框、文本层级。
- 语义色用于成功、警告、错误和信息提示。
- 不要让页面所有模块都使用主色。

### 3.2 字体 Token

常见结构：

\`\`\`md
font.family.base
font.size.display
font.size.h1
font.size.h2
font.size.body
font.size.caption
font.weight.regular
font.weight.medium
font.weight.semibold
line.height.tight
line.height.normal
line.height.relaxed
\`\`\`

设计建议：

- 不要使用太多字号。
- 标题、正文、辅助文字要有明显层级。
- B 端界面更适合紧凑字体层级。
- C 端和品牌页可以有更强展示标题。

### 3.3 间距 Token

推荐使用 4 或 8 的倍数。

\`\`\`md
space.4
space.8
space.12
space.16
space.24
space.32
space.48
space.64
\`\`\`

设计建议：

- 组件内部间距小于模块间距。
- 相关信息靠近，不相关信息拉开。
- 页面外边距需要随屏幕变化。

### 3.4 圆角 Token

\`\`\`md
radius.4
radius.6
radius.8
radius.12
radius.full
\`\`\`

设计建议：

- B 端工具一般使用较小圆角。
- C 端和生活方式产品可以更柔和。
- 同类组件圆角要统一。

### 3.5 阴影 Token

\`\`\`md
shadow.sm
shadow.md
shadow.lg
shadow.overlay
\`\`\`

设计建议：

- 阴影主要用于浮层、弹窗、抽屉、悬浮卡片。
- 不要给所有卡片都加重阴影。
- 深色界面中阴影不明显，可用边框和明度区分层级。

### 3.6 动效 Token

\`\`\`md
motion.fast = 120ms
motion.normal = 180ms
motion.slow = 240ms
easing.standard
easing.enter
easing.exit
\`\`\`

设计建议：

- 动效要帮助理解状态变化。
- 工具类产品动效更克制。
- C 端产品可使用更有品牌感的微交互。

### 3.7 提示词片段

\`\`\`md
请使用 design tokens 组织界面样式：
定义 color、typography、spacing、radius、shadow、motion。
所有组件必须引用这些 token，保证按钮、输入框、卡片、表格和弹窗风格一致。
\`\`\`

---

## 4. Foundations 基础规范

### 4.1 色彩系统

需要定义：

- 主色。
- 辅助色。
- 中性色。
- 语义色。
- 背景色。
- 文本色。
- 边框色。

检查问题：

- 主色是否被滥用。
- 语义色是否符合用户直觉。
- 文本对比度是否足够。
- 深浅背景下是否都可读。

### 4.2 字体系统

需要定义：

- 字体族。
- 字号层级。
- 字重层级。
- 行高。
- 文本截断规则。

检查问题：

- 是否所有文字都差不多大。
- 是否标题过大导致工具界面像营销页。
- 是否辅助信息过弱导致看不清。

### 4.3 布局系统

需要定义：

- 页面最大宽度。
- 栅格列数。
- 内容区宽度。
- 断点。
- 页面边距。
- 模块间距。

常见断点：

\`\`\`md
mobile: 0-767px
tablet: 768-1023px
desktop: 1024-1439px
wide: 1440px+
\`\`\`

### 4.4 图标系统

需要定义：

- 图标风格。
- 线宽。
- 尺寸。
- 填充或线性。
- 使用场景。

建议：

- 工具类产品优先使用清晰线性图标。
- 图标按钮需要 tooltip。
- 不要混用多套图标风格。

---

## 5. Components 组件库

### 5.1 组件分层

基础组件：

- Button。
- Input。
- Select。
- Checkbox。
- Radio。
- Switch。
- Tabs。

复合组件：

- Table。
- Card。
- Modal。
- Drawer。
- Form。
- Navigation。
- Filter bar。

业务组件：

- 客户卡片。
- 商品卡片。
- 订单摘要。
- AI 生成结果卡。
- 数据指标卡。

### 5.2 组件文档应该写什么

每个组件需要包含：

- 用途。
- 结构。
- 类型。
- 尺寸。
- 状态。
- 交互规则。
- 文案规则。
- 禁用场景。
- 响应式规则。

### 5.3 组件状态矩阵

| 组件 | 必备状态 |
| --- | --- |
| Button | default, hover, active, focus, disabled, loading |
| Input | default, focus, filled, disabled, error, success |
| Select | closed, open, selected, disabled, empty, loading |
| Table | loading, empty, error, hover row, selected row |
| Card | default, hover, selected, loading |
| Modal | open, loading, error, disabled submit |

### 5.4 提示词片段

\`\`\`md
请生成一套小型组件库，并在页面中复用它。
组件包括 Button、Input、Select、Tabs、Table、Card、Modal、Drawer 和 Toast。
每个组件都需要完整状态和统一尺寸、圆角、字体、颜色。
\`\`\`

---

## 6. Patterns 场景模式

组件解决局部问题，Pattern 解决一类业务场景。

### 6.1 常见 Pattern

搜索与筛选：

- 搜索框。
- 筛选器。
- 已选条件。
- 清除筛选。
- 结果统计。

表单提交：

- 字段分组。
- 校验。
- 提交 loading。
- 成功反馈。
- 错误定位。

列表详情：

- 列表。
- 行点击。
- 右侧抽屉详情。
- 编辑状态。
- 返回列表上下文。

空状态引导：

- 说明原因。
- 主操作。
- 次操作。

危险操作：

- 触发操作。
- 确认弹窗。
- 说明影响。
- 执行 loading。
- 结果反馈。

### 6.2 提示词片段

\`\`\`md
请为这个页面设计常见业务模式：
搜索筛选、列表详情、表单提交、空状态引导和危险操作确认。
每个模式都要包含用户路径、组件组合和状态反馈。
\`\`\`

---

## 7. Content Guidelines 文案规范

### 7.1 按钮文案

建议：

- 使用动词。
- 简短明确。
- 避免“确定”滥用。

示例：

- 保存。
- 创建客户。
- 导出报表。
- 重新生成。
- 申请权限。

### 7.2 错误文案

结构：

\`\`\`md
发生了什么 + 为什么 + 下一步怎么做
\`\`\`

示例：

\`\`\`md
上传失败，文件格式不支持。请上传 CSV 或 XLSX 文件。
\`\`\`

### 7.3 空状态文案

结构：

\`\`\`md
当前状态 + 原因/价值 + 下一步操作
\`\`\`

示例：

\`\`\`md
还没有客户记录。导入客户数据后，你可以在这里查看跟进状态和成交进度。
\`\`\`

---

## 8. Accessibility 可访问性

### 8.1 基础要求

- 文本和背景有足够对比。
- 交互元素有 focus 状态。
- 表单字段有 label。
- 图标按钮有可读名称。
- 状态不只依赖颜色表达。
- 主要流程可通过键盘操作。

### 8.2 提示词片段

\`\`\`md
请保证基础可访问性：
文本对比度足够，交互元素有 focus 状态，表单有 label，图标按钮有可读名称，状态不只依赖颜色表达。
\`\`\`

---

## 9. 如何在 vibe coding 中要求设计系统

### 9.1 简短版

\`\`\`md
请先定义一套小型设计系统，包括颜色、字体、间距、圆角、阴影、动效和组件状态，再基于这套系统实现页面。
\`\`\`

### 9.2 完整版

\`\`\`md
请为【产品名称】建立一套轻量设计系统，并用它实现【页面名称】。

设计系统需要包含：
1. 设计原则：清晰、一致、状态完整、响应式可靠。
2. Design tokens：color、typography、spacing、radius、shadow、motion。
3. 基础组件：Button、Input、Select、Checkbox、Tabs、Table、Card、Modal、Drawer、Toast。
4. 状态规范：default、hover、active、focus、selected、disabled、loading、empty、error、success。
5. 响应式规则：桌面端、平板端、移动端分别如何布局。

页面中的所有模块都必须使用这套系统，不要出现样式碎片化。
\`\`\`

---

## 10. 设计系统检查清单

- 是否有明确设计原则。
- 是否定义颜色 token。
- 是否定义字体层级。
- 是否定义 4/8 间距体系。
- 是否定义圆角和阴影规则。
- 是否定义常见组件。
- 是否补全组件状态。
- 是否有响应式断点。
- 是否有文案和错误提示规则。
- 是否考虑可访问性。
- 页面中是否存在不符合系统的例外样式。

`,A0=`# 好界面拆解方法

> 用途：训练你从优秀界面中看出“为什么好”，并把审美判断翻译成可用于 vibe coding 的专业提示词。

---

## 1. 拆解的目标

拆解不是简单评价“好看”或“不好看”，而是要回答：

- 这个界面服务什么用户和任务。
- 它的视觉层级为什么清楚。
- 它如何组织信息。
- 它的风格从哪里来。
- 它用了哪些组件和状态。
- 哪些设计方法可以复用到自己的提示词里。

---

## 2. 五层拆解法

## 2.1 第一层：产品与场景

先判断界面属于什么产品，而不是直接看颜色。

需要观察：

- 产品类型：B 端、C 端、电商、工具、社区、官网、AI 产品。
- 目标用户：新手、专业用户、管理者、消费者、创作者。
- 使用场景：高频工作、移动碎片化、沉浸阅读、快速购买、数据分析。
- 页面目标：浏览、购买、编辑、管理、生成、监控、提交。

记录模板：

\`\`\`md
产品类型：
目标用户：
使用场景：
页面目标：
用户最重要的操作：
\`\`\`

转成提示词：

\`\`\`md
请设计一个【产品类型】的【页面】，目标用户是【用户】，他们在【场景】下需要完成【任务】。页面需要优先突出【主操作/核心信息】。
\`\`\`

---

## 2.2 第二层：信息架构

信息架构决定用户能否快速理解页面。

需要观察：

- 页面分成几个区域。
- 首屏最重要的信息是什么。
- 哪些内容被放大，哪些内容被弱化。
- 信息顺序是否符合用户决策过程。
- 导航、筛选、搜索、标签如何帮助用户定位。

记录模板：

\`\`\`md
首屏信息：
主模块：
辅助模块：
导航方式：
用户阅读顺序：
信息分组方式：
\`\`\`

判断标准：

- 用户是否一眼知道页面主题。
- 主操作是否明显。
- 信息是否按照重要程度排列。
- 相同类型的信息是否被放在一起。
- 次要信息是否没有抢戏。

转成提示词：

\`\`\`md
请按照用户决策顺序组织信息：首屏展示【核心信息】，主体包含【主模块】，辅助信息包括【辅助模块】。主操作【CTA】需要有最高视觉权重，次要操作保持可见但弱化。
\`\`\`

---

## 2.3 第三层：视觉层级

视觉层级决定用户先看哪里、后看哪里。

需要观察：

- 哪个元素最大。
- 哪个颜色最突出。
- 哪些内容使用高对比。
- 标题、正文、辅助文字如何区分。
- 留白如何制造节奏。
- 卡片、分割线、背景色如何分组。

记录模板：

\`\`\`md
最高视觉权重：
第二视觉权重：
弱化信息：
字号层级：
颜色层级：
间距节奏：
\`\`\`

判断标准：

- 是否所有元素都在争抢注意力。
- 主标题是否过大或过弱。
- 辅助文字是否可读。
- 按钮是否符合操作优先级。
- 页面是否有呼吸感。

转成提示词：

\`\`\`md
请建立清晰视觉层级：最高权重给【核心信息/主操作】，第二权重给【辅助决策信息】，弱化【低频信息】。通过字号、字重、颜色、间距和留白形成阅读节奏。
\`\`\`

---

## 2.4 第四层：视觉风格

风格不是单个颜色，而是一组选择共同形成的气质。

需要观察：

- 色彩：高饱和还是低饱和，冷色还是暖色。
- 字体：理性、温暖、精致、科技、年轻。
- 圆角：硬朗、小圆角、大圆角、胶囊。
- 阴影：平面、轻微浮起、强卡片感。
- 图片：真实产品图、插画、图标、数据图。
- 动效：克制、轻快、沉浸、强反馈。

记录模板：

\`\`\`md
风格关键词：
主色：
辅助色：
字体气质：
图片/图标风格：
圆角与阴影：
动效感觉：
\`\`\`

判断标准：

- 风格是否符合产品类型。
- 是否有品牌记忆点。
- 是否过度模板化。
- 是否为了个性牺牲可读性。

转成提示词：

\`\`\`md
视觉风格请走【风格关键词】方向。通过【色彩】、【字体】、【图标/图片】、【圆角/阴影】和【动效】体现品牌气质。整体需要有记忆点，但不能牺牲可读性和主路径效率。
\`\`\`

---

## 2.5 第五层：组件与状态

优秀界面通常不是静态图，而是考虑了真实使用状态。

需要观察：

- 用了哪些组件。
- 按钮分几种层级。
- 表单是否有校验。
- 表格是否支持筛选、排序、分页。
- 列表是否有空状态。
- 加载和错误状态如何处理。
- 移动端是否有适配策略。

记录模板：

\`\`\`md
主要组件：
组件状态：
表单规则：
反馈方式：
空状态：
错误状态：
移动端变化：
\`\`\`

转成提示词：

\`\`\`md
请补全组件状态，包括 default、hover、active、focus、selected、disabled、loading、empty、error 和 success。页面中的【组件列表】都需要有真实交互反馈，而不是只做静态展示。
\`\`\`

---

## 3. 十分钟快速拆解流程

### 第 1 分钟：判断产品类型

问自己：

- 这是 B 端还是 C 端。
- 用户是来工作、消费、浏览、创作还是管理。
- 页面最重要的任务是什么。

### 第 2-3 分钟：圈出信息区域

标记：

- 导航。
- 首屏主内容。
- 操作区。
- 数据区。
- 辅助信息。
- 反馈区。

### 第 4-5 分钟：判断视觉层级

观察：

- 最大的文字是什么。
- 最醒目的按钮是什么。
- 哪些内容被弱化。
- 模块间距是否有规律。

### 第 6-7 分钟：提取风格关键词

用 3-5 个词描述：

- 专业克制。
- 精致高级。
- 活泼年轻。
- 温暖可信。
- 科技未来。
- 杂志感。
- 工具感。

### 第 8-9 分钟：记录组件

列出：

- 按钮。
- 输入框。
- 标签。
- 卡片。
- 表格。
- 弹窗。
- 导航。
- 状态反馈。

### 第 10 分钟：翻译成提示词

把观察转成：

\`\`\`md
产品类型 + 用户场景 + 页面目标 + 信息结构 + 风格方向 + 组件状态 + 避免事项
\`\`\`

## 5. 常见界面类型拆解重点

## 5.1 B 端后台

重点看：

- 信息密度。
- 表格可读性。
- 筛选效率。
- 状态标签。
- 批量操作。
- 导航层级。
- 空、加载、错误状态。

不要只看：

- 卡片好不好看。
- 颜色是否高级。

提示词重点：

\`\`\`md
强调专业、清晰、高效、可扫描、状态完整和批量操作。
\`\`\`

## 5.2 C 端 App

重点看：

- 首屏吸引力。
- 品牌记忆点。
- 内容节奏。
- 主操作是否易触达。
- 微交互是否自然。
- 底部导航是否清楚。

提示词重点：

\`\`\`md
强调用户情绪、品牌气质、移动端触控、内容节奏和轻量反馈。
\`\`\`

## 5.3 电商页面

重点看：

- 商品图。
- 价格。
- 优惠。
- 评价。
- 规格选择。
- 购买 CTA。
- 信任信息。

提示词重点：

\`\`\`md
强调商品真实呈现、购买转化、信任建立、规格选择和结算路径。
\`\`\`

## 5.4 AI 产品

重点看：

- 输入区是否清楚。
- 生成状态是否明确。
- 结果区是否可操作。
- 历史记录和参数是否好找。
- 错误和重试是否友好。

提示词重点：

\`\`\`md
强调 prompt 输入、生成中状态、结果操作、历史记录、参数控制和可信感。
\`\`\`

## 5.5 品牌官网

重点看：

- 首屏是否呈现真实产品或品牌。
- H1 是否明确。
- CTA 是否清楚。
- 视觉资产是否高质量。
- 页面节奏是否有起伏。

提示词重点：

\`\`\`md
强调品牌识别、真实视觉资产、价值主张、页面节奏和转化路径。
\`\`\`

| 很高级 | 色彩低饱和，排版精致，图片质感高，阴影克制 |
| 很专业 | 信息密度合理，组件一致，状态完整，操作路径清楚 |
| 很有设计感 | 版式有节奏，视觉层级强，有品牌记忆点 |
| 很舒服 | 字号、行高、间距和色彩对比适合长时间阅读 |
| 很科技 | 结构精密，数据表达清楚，动效和高光克制 |
| 很年轻 | 色彩更鲜明，图标友好，微交互轻快 |

## 3. 专业克制

### 3.1 适合场景

- B 端后台。
- CRM。
- 数据看板。
- 金融工具。
- 开发者平台。
- 企业协作工具。

### 3.2 视觉手段

- 中性色背景。
- 小圆角。
- 清晰边框。
- 稳定字号层级。
- 高信息密度。
- 克制阴影。
- 状态标签语义明确。
- 表格和筛选器优先。

### 3.3 常用关键词

- restrained：克制。
- structured：结构化。
- efficient：高效。
- data-forward：数据优先。
- enterprise-grade：企业级。
- utilitarian：实用导向。
- clean：干净。

### 3.4 容易踩坑

- 做得太灰，没有重点。
- 信息密度过高，变拥挤。
- 所有模块都像表格，缺少层级。
- 使用大面积蓝色导致模板感。

### 3.5 提示词

\`\`\`md
视觉风格请走专业克制路线：
使用中性色背景、小圆角、清晰边框、稳定字号层级和高效布局。
主色只用于关键操作、选中状态和链接。
信息密度中高，但通过分组、对齐和留白保持可扫描。
避免营销感、大面积渐变、夸张阴影和无意义插画。
\`\`\`

---

## 4. 精致高级

### 4.1 适合场景

- 高端电商。
- 品牌官网。
- 家居、香氛、护肤、时尚。
- 作品集。
- 生活方式产品。

### 4.2 视觉手段

- 大图或高质量产品图。
- 低饱和色彩。
- 更细腻的字体层级。
- 充足留白。
- 轻阴影或无阴影。
- 精确对齐。
- 适度使用细线和材质感。

### 4.3 常用关键词

- premium：高级。
- refined：精致。
- elegant：优雅。
- minimal：极简。
- editorial：杂志感。
- curated：精选感。
- tactile：有触感。

### 4.4 容易踩坑

- 留白过多导致内容空。
- 字太小影响可读。
- 只有黑白灰，没有品牌识别。
- 图片质量不够，反而显廉价。

### 4.5 提示词

\`\`\`md
视觉风格请走精致高级路线：
使用高质量产品图、低饱和配色、充足留白、细腻字体层级和克制阴影。
通过比例、对齐、材质和排版体现高级感，而不是堆叠装饰。
整体要像成熟品牌产品，避免模板感和廉价促销感。
\`\`\`

---

## 5. 活泼年轻

### 5.1 适合场景

- 年轻消费 App。
- 社交产品。
- 兴趣社区。
- 教育产品。
- 活动页。
- 娱乐产品。

### 5.2 视觉手段

- 明亮强调色。
- 友好图标。
- 更圆润的组件。
- 卡片节奏更活泼。
- 轻量动效。
- 更强的互动反馈。

### 5.3 常用关键词

- playful：活泼。
- vibrant：鲜明。
- friendly：友好。
- expressive：有表现力。
- energetic：有能量。
- approachable：亲近。

### 5.4 容易踩坑

- 过度可爱，显幼稚。
- 颜色太多，信息混乱。
- 动效太多，影响效率。
- 图标和插画风格不统一。

### 5.5 提示词

\`\`\`md
视觉风格请走活泼年轻路线：
使用鲜明但受控的强调色、友好图标、轻快卡片节奏和自然微交互。
整体有能量和亲和力，但信息层级必须清晰。
避免过度糖果色、幼稚插画和杂乱装饰。
\`\`\`

---

## 6. 温暖可信

### 6.1 适合场景

- 健康管理。
- 心理服务。
- 教育。
- 亲子。
- 本地生活。
- 保险、咨询类服务。

### 6.2 视觉手段

- 柔和暖色。
- 舒适行高。
- 清晰说明文案。
- 圆角适中。
- 反馈语气友好。
- 图标和插画更人性化。

### 6.3 常用关键词

- warm：温暖。
- calm：平静。
- trustworthy：可信。
- human-centered：以人为中心。
- soft：柔和。
- reassuring：让人安心。

### 6.4 容易踩坑

- 颜色太淡，对比不足。
- 太温柔导致主操作不明显。
- 文案过度情绪化。
- 插画过多影响专业感。

### 6.5 提示词

\`\`\`md
视觉风格请走温暖可信路线：
使用柔和但有足够对比的色彩、舒适字号、清晰说明和友好反馈。
界面需要让用户感觉安心、可靠、有人情味。
主操作仍然需要明确，避免因为过度柔和导致效率下降。
\`\`\`

---

## 7. 科技未来

### 7.1 适合场景

- AI 产品。
- 数据分析。
- 硬件官网。
- 开发者工具。
- 安全产品。
- Web3 或实验性技术产品。

### 7.2 视觉手段

- 精密网格。
- 深浅对比。
- 细线和高光。
- 数据可视化。
- 轻微发光。
- 半透明材质。
- 流式状态反馈。

### 7.3 常用关键词

- futuristic：未来感。
- technical：技术感。
- precise：精密。
- intelligent：智能。
- luminous：发光感。
- immersive：沉浸。
- computational：计算感。

### 7.4 容易踩坑

- 满屏蓝紫渐变。
- 模糊光斑过多。
- 数据不可读。
- 为科技感牺牲交互清晰。

### 7.5 提示词

\`\`\`md
视觉风格请走现代科技路线：
科技感来自清晰结构、精密组件、动态数据、细腻高光和状态反馈。
可以使用深浅对比、细线、半透明材质和轻微发光，但必须克制。
避免满屏蓝紫渐变、模糊光斑和空洞 AI 装饰。
\`\`\`

## 8. 杂志感 Editorial

### 8.1 适合场景

- 内容网站。
- 品牌故事页。
- 作品集。
- 生活方式产品。
- 高端电商。

### 8.2 视觉手段

- 大标题。
- 强图文比例。
- 不对称排版。
- 丰富留白。
- 明确章节节奏。
- 图片叙事。

### 8.3 常用关键词

- editorial：杂志感。
- art-directed：美术指导感。
- cinematic：电影感。
- narrative：叙事感。
- curated：精选。
- spacious：有留白。

### 8.4 容易踩坑

- 可读性下降。
- 页面像海报，不像产品。
- CTA 不明显。
- 移动端排版失控。

### 8.5 提示词

\`\`\`md
视觉风格请带有 editorial 杂志感：
使用大标题、清晰图文比例、章节节奏和高质量图片。
可以有更强排版个性，但主操作和阅读路径必须清楚。
移动端需要重新组织排版，避免文字和图片互相遮挡。
\`\`\`

---

## 9. 工具感

### 9.1 适合场景

- 编辑器。
- AI 工作台。
- 设计工具。
- 开发者工具。
- 文件管理。
- 数据处理。

### 9.2 视觉手段

- 明确工作区。
- 工具栏。
- 属性面板。
- 快捷操作。
- 紧凑控件。
- 清楚的选中态。
- 保存和同步状态。

### 9.3 常用关键词

- focused：专注。
- compact：紧凑。
- controllable：可控。
- precise：精确。
- workspace-oriented：工作区导向。
- non-distracting：低干扰。

### 9.4 容易踩坑

- 面板太多，用户不知道从哪开始。
- 控件太小，不好操作。
- 装饰元素干扰工作区。
- 没有保存、撤销、选中等状态。

### 9.5 提示词

\`\`\`md
视觉风格请走专业工具感：
画布或工作区是视觉中心，工具栏和属性面板紧凑清晰。
控件强调可控、精确和低干扰。
必须包含选中状态、撤销重做、保存状态、加载和错误反馈。
\`\`\`

---

## 10. 复古现代

### 10.1 适合场景

- 音乐。
- 文化活动。
- 咖啡品牌。
- 独立杂志。
- 潮流品牌。
- 艺术项目。

### 10.2 视觉手段

- 复古色彩。
- 粗体标题。
- 颗粒质感。
- 边框和标签。
- 老海报式排版。
- 现代网格控制秩序。

### 10.3 常用关键词

- retro-modern：复古现代。
- nostalgic：怀旧。
- poster-like：海报感。
- tactile：有触感。
- bold typography：强字体。
- analog texture：模拟质感。

### 10.4 容易踩坑

- 复古变成陈旧。
- 纹理过多影响阅读。
- 字体太花。
- 与产品功能不匹配。

### 10.5 提示词

\`\`\`md
视觉风格请走复古现代路线：
使用复古色彩、强字体、轻微颗粒质感和海报式节奏，但用现代网格保持秩序。
整体要有文化感和记忆点，避免过度怀旧导致界面显旧。
\`\`\`

---

## 11. 实验先锋

### 11.1 适合场景

- 创意工作室。
- 艺术展览。
- 潮流品牌。
- 音乐活动。
- 实验性 AI 产品。

### 11.2 视觉手段

- 非常规布局。
- 强对比。
- 特殊排版。
- 动态交互。
- 局部破格。
- 强识别色。

### 11.3 常用关键词

- experimental：实验性。
- avant-garde：先锋。
- expressive：表达性强。
- unconventional：非常规。
- bold：大胆。
- distinctive：有识别度。

### 11.4 容易踩坑

- 用户找不到主操作。
- 视觉噪音太高。
- 不适合高频工具。
- 移动端难适配。

### 11.5 提示词

\`\`\`md
视觉风格可以更实验和先锋：
允许在局部排版、色彩、动效或结构上做非常规处理。
但核心操作、阅读路径和响应式必须稳定。
个性应该服务品牌记忆点，不要随机破坏可用性。
\`\`\`

---

## 12. 风格组合公式

### 12.1 专业 + 温暖

适合：

- 医疗 SaaS。
- 教育后台。
- 人力资源系统。

提示词：

\`\`\`md
整体保持 B 端专业清晰，但色彩和文案更温暖可信。
用柔和中性色、清晰表格、友好空状态和明确反馈，让系统既高效又不冷冰冰。
\`\`\`

### 12.2 科技 + 克制

适合：

- AI 工作台。
- 数据分析工具。
- 开发者平台。

提示词：

\`\`\`md
整体是现代科技感，但表达克制。
使用精密布局、清晰数据、细线、高质量状态反馈，而不是大面积蓝紫渐变。
\`\`\`

### 12.3 高级 + 转化

适合：

- 高端电商。
- 品牌官网。
- 咨询服务。

提示词：

\`\`\`md
整体精致高级，但转化路径必须清楚。
用高质量图片、充足留白和细腻排版建立信任，同时让主 CTA 始终明确可见。
\`\`\`

### 12.4 年轻 + 工具

适合：

- 学习工具。
- 创作者工具。
- 轻量效率 App。

提示词：

\`\`\`md
整体年轻友好，但保持工具效率。
可以使用鲜明强调色和轻快微交互，但控件布局、状态反馈和主要工作区必须清晰。
\`\`\`

---

## 13. 反向风格词

当你不想要某种感觉，可以这样写：

\`\`\`md
避免模板感、廉价促销感、过度科技感、幼稚可爱风、信息混乱、过度装饰、大面积渐变、无意义插画、所有模块视觉权重相同。
\`\`\`

更专业的写法：

\`\`\`md
请避免使用无业务含义的装饰图形、泛用渐变背景、过重阴影和过多高饱和颜色。
页面需要像真实产品，内容、状态和操作路径都要完整。
\`\`\`

---

## 14. 风格提示词生成器

\`\`\`md
请根据下面的风格要求，生成适合【产品类型】的 UI 视觉方向：

产品类型：
目标用户：
使用场景：
希望的风格关键词：
不希望出现的风格：
品牌情绪：
核心页面：

输出内容：
1. 风格定位。
2. 色彩建议。
3. 字体和排版建议。
4. 组件风格建议。
5. 图片/图标建议。
6. 动效建议。
7. 可直接用于 vibe coding 的完整提示词。
\`\`\`

`,z0=`# 生成页面后的 UI 质量评审清单

> 用途：当你用 vibe coding 生成页面后，用这份清单检查界面是否专业、完整、美观、可用，并指导下一轮迭代。

---

## 1. 快速评审方法

### 1.1 三步判断

第一步：看目标是否清楚。

- 用户一眼知道这个页面是干什么的吗？
- 主操作是否明显？
- 关键信息是否在合适位置？

第二步：看视觉是否专业。

- 字号、颜色、间距是否统一？
- 页面是否有层级和节奏？
- 是否有模板感或过度装饰？

第三步：看状态是否完整。

- 有加载状态吗？
- 有空状态吗？
- 有错误状态吗？
- 有 hover、focus、disabled、success 吗？

---

## 2. 总评分表

| 维度 | 满分 | 评分 |
| --- | --- | --- |
| 页面目标清晰度 | 10 |  |
| 信息架构 | 10 |  |
| 视觉层级 | 10 |  |
| 色彩系统 | 10 |  |
| 字体与排版 | 10 |  |
| 组件一致性 | 10 |  |
| 交互状态 | 10 |  |
| 响应式适配 | 10 |  |
| 可访问性 | 10 |  |
| 品牌个性 | 10 |  |

评价建议：

- 90-100：接近高质量上线稿。
- 75-89：整体可用，有局部细节需要迭代。
- 60-74：结构可用，但视觉和状态明显不足。
- 60 以下：需要重新梳理目标、信息层级和组件系统。

---

## 3. 页面目标检查

### 3.1 检查问题

- 页面服务的用户是谁？
- 用户来到这里要完成什么任务？
- 最重要的信息是否在首屏或高权重区域？
- 主操作是否足够明显？
- 次要操作是否没有抢主操作？
- 页面是否有太多无关内容？

### 3.2 常见问题

- 页面像展示稿，不像可用产品。
- 首屏只有口号，没有真实内容。
- 主按钮不明显。
- 信息顺序不符合用户决策路径。

### 3.3 修改提示词

\`\`\`md
请重新优化页面目标和首屏信息：
让用户在 5 秒内理解这个页面的用途。
突出【核心信息】和【主操作】。
弱化【次要信息】，移除无助于用户完成任务的装饰内容。
\`\`\`

---

## 4. 信息架构检查

### 4.1 检查问题

- 页面是否有清晰分区？
- 模块顺序是否符合用户理解顺序？
- 导航是否清楚？
- 搜索、筛选、排序是否在合理位置？
- 相关信息是否被放在一起？
- 复杂信息是否使用渐进披露？

### 4.2 常见问题

- 所有模块平铺，没有主次。
- 筛选器离结果列表太远。
- 详情信息和操作混在一起。
- 内容分组依赖视觉装饰，而不是逻辑。

### 4.3 修改提示词

\`\`\`md
请重新组织信息架构：
按照用户完成任务的顺序排列模块。
把相关信息分组，把低频信息折叠或放到详情区。
搜索、筛选和结果列表需要形成明确关系。
\`\`\`

---

## 5. 视觉层级检查

### 5.1 检查问题

- 用户第一眼会看哪里？
- 页面是否有明确主视觉或核心模块？
- 标题、正文、辅助文字是否有层级？
- 颜色是否用于强调真正重要的信息？
- 留白是否帮助分组？
- 是否所有卡片都一样重？

### 5.2 常见问题

- 所有卡片大小相似，页面没有重点。
- 标题太大，像营销页，不适合工具界面。
- 按钮过多，用户不知道点哪个。
- 辅助信息颜色太浅，看不清。

### 5.3 修改提示词

\`\`\`md
请强化视觉层级：
最高权重给【核心信息/主操作】。
第二权重给【辅助决策信息】。
降低【低频信息】的视觉权重。
通过字号、字重、颜色、间距和留白形成清晰阅读顺序。
\`\`\`

---

## 6. 色彩系统检查

### 6.1 检查问题

- 是否有明确主色？
- 主色是否被过度使用？
- 中性色是否承担背景、边框和文字层级？
- 成功、警告、错误、信息是否使用语义色？
- 文本和背景对比是否足够？
- 页面是否被单一色相统治？

### 6.2 常见问题

- 满屏蓝紫渐变，科技感模板化。
- 所有按钮和标签都用主色。
- 颜色太多，没有系统。
- 辅助文字对比度不足。

### 6.3 修改提示词

\`\`\`md
请重构色彩系统：
使用一个主色、稳定中性色和清晰语义色。
主色只用于关键操作、选中状态和链接。
成功、警告、错误和信息状态需要语义明确。
保证文字和背景有足够对比度。
\`\`\`

---

## 7. 字体与排版检查

### 7.1 检查问题

- 字体层级是否清楚？
- 页面标题、模块标题、正文、辅助文字是否区分？
- 行高是否舒适？
- 长文本是否会溢出？
- 数字、价格、指标是否格式统一？
- 按钮文案是否简洁明确？

### 7.2 常见问题

- 字号太多，页面碎。
- 所有文字大小接近，缺少重点。
- 字太小或对比太低。
- 英文、数字和中文混排不整齐。

### 7.3 修改提示词

\`\`\`md
请优化字体和排版：
建立清晰文本层级，包括页面标题、模块标题、正文、辅助文字和标签。
统一字号、字重和行高。
长文本需要截断、换行或 tooltip 策略，避免溢出。
数字和金额格式保持一致。
\`\`\`

---

## 8. 布局与间距检查

### 8.1 检查问题

- 页面是否使用清晰栅格？
- 模块之间间距是否统一？
- 组件内部间距是否合理？
- 内容是否过挤或过空？
- 对齐是否一致？
- 移动端是否重新组织布局？

### 8.2 常见问题

- 卡片之间距离不一致。
- 内容贴边。
- 模块之间没有逻辑间距。
- 移动端只是缩小桌面端布局。

### 8.3 修改提示词

\`\`\`md
请优化布局和间距：
使用 4/8 间距体系和稳定栅格。
相关信息靠近，不相关模块拉开。
统一卡片、表单、按钮和列表的内外边距。
移动端重新组织为单列布局。
\`\`\`

---

## 9. 组件一致性检查

### 9.1 检查问题

- 按钮高度是否一致？
- 输入框、选择器、搜索框是否同一风格？
- 卡片圆角、边框、阴影是否统一？
- 图标线宽是否一致？
- 标签、徽标、状态色是否规范？
- 弹窗、抽屉、Toast 是否属于同一设计语言？

### 9.2 常见问题

- 每个模块像来自不同模板。
- 同类按钮样式不一致。
- 图标风格混用。
- 阴影和圆角无规则。

### 9.3 修改提示词

\`\`\`md
请统一组件语言：
按钮、输入框、选择器、卡片、表格、标签、弹窗和 Toast 都必须使用同一套圆角、边框、字体、颜色和状态规则。
避免每个模块使用不同风格。
\`\`\`

---

## 10. 交互状态检查

### 10.1 检查问题

- 按钮是否有 hover、active、focus、disabled、loading？
- 表单是否有校验状态？
- 表格是否有 hover row、selected row、loading、empty、error？
- 提交后是否有成功或失败反馈？
- 危险操作是否确认？
- 用户是否知道操作正在进行？

### 10.2 常见问题

- 只有静态页面。
- 点击后没有反馈。
- 表单错误只在顶部显示，不定位字段。
- 删除操作没有确认。
- loading 导致页面跳动。

### 10.3 修改提示词

\`\`\`md
请补全交互状态：
所有按钮、表单、表格、卡片、导航和弹窗都需要 default、hover、active、focus、selected、disabled、loading、empty、error 和 success 状态。
提交、删除、导出、生成等关键操作必须有明确反馈。
\`\`\`

---

## 11. 响应式检查

### 11.1 检查问题

- 桌面端、平板端、移动端是否都有布局策略？
- 移动端是否单列？
- 表格在移动端如何处理？
- 导航在移动端如何变化？
- 按钮是否足够大？
- 文本是否溢出或遮挡？

### 11.2 常见问题

- 桌面端缩小后直接挤爆。
- 表格在移动端不可读。
- 固定按钮遮挡内容。
- 导航占据太多空间。

### 11.3 修改提示词

\`\`\`md
请优化响应式：
桌面端使用【桌面布局】。
平板端减少列数。
移动端改为单列布局，表格改为卡片列表或横向滚动。
触控区域足够大，文本不能溢出或互相遮挡。
\`\`\`

---

## 12. 可访问性检查

### 12.1 检查问题

- 文本对比度是否足够？
- 交互元素是否有 focus 状态？
- 表单字段是否有 label？
- 图标按钮是否有可读名称或 tooltip？
- 是否只靠颜色表达状态？
- 错误信息是否清楚？

### 12.2 常见问题

- 灰色文字太浅。
- 图标按钮没有说明。
- 选中和错误只靠颜色区分。
- 键盘用户无法判断当前位置。

### 12.3 修改提示词

\`\`\`md
请补充基础可访问性：
保证文字和背景对比度足够。
所有交互元素有清晰 focus 状态。
表单字段有 label。
图标按钮有可读名称或 tooltip。
状态不能只依赖颜色表达。
\`\`\`

---

## 13. 品牌个性检查

### 13.1 检查问题

- 页面是否有品牌记忆点？
- 风格是否符合产品类型？
- 是否太像模板？
- 个性来自哪里：色彩、排版、图片、动效、组件形态还是文案？
- 个性是否影响可用性？

### 13.2 常见问题

- 页面很完整但没有识别度。
- 所有模块都是通用卡片。
- 用装饰代替品牌。
- 个性化元素和业务无关。

### 13.3 修改提示词

\`\`\`md
请增强品牌个性：
在不影响可读性和主路径效率的前提下，通过【色彩/排版/图片/图标/动效/组件形态】建立识别度。
避免随机装饰，个性要服务产品气质和用户场景。
\`\`\`

---

## 14. 不同产品的专项检查

## 14.1 B 端后台

重点检查：

- 表格是否清晰。
- 筛选是否高效。
- 状态标签是否明确。
- 批量操作是否完整。
- 数据加载、空状态、错误状态是否完整。
- 信息密度是否合适。

专项提示词：

\`\`\`md
请按 B 端后台标准优化：
提升表格可读性、筛选效率、状态标签清晰度和批量操作完整度。
整体保持专业克制，不要营销化。
\`\`\`

## 14.2 C 端 App

重点检查：

- 首屏是否吸引人。
- 主操作是否易触达。
- 底部导航是否清楚。
- 卡片节奏是否适合浏览。
- 微交互是否自然。

专项提示词：

\`\`\`md
请按 C 端 App 标准优化：
提升首屏吸引力、品牌记忆点、底部导航清晰度和触控体验。
内容节奏要轻快，主操作要易触达。
\`\`\`

## 14.3 电商

重点检查：

- 商品图是否清晰。
- 价格和优惠是否明确。
- CTA 是否强。
- 评价、物流、保障是否建立信任。
- 规格选择和购买流程是否顺。

专项提示词：

\`\`\`md
请按电商转化标准优化：
突出商品图、价格、优惠、评价、保障和购买 CTA。
规格选择、加入购物车、立即购买和错误提醒都需要完整。
\`\`\`

## 14.4 AI 产品

重点检查：

- 输入区是否清楚。
- 生成状态是否明确。
- 结果是否可操作。
- 参数控制是否好理解。
- 历史记录是否可找回。
- 失败是否可重试。

专项提示词：

\`\`\`md
请按 AI 产品工作流优化：
强化 prompt 输入、参数控制、生成中状态、结果操作、历史记录和失败重试。
科技感保持克制，重点体现可信和可控。
\`\`\`

---

## 15. 评审提示词模板

## 15.1 全面评审

\`\`\`md
请作为资深 UI/UX 设计师评审当前页面。

请从以下维度打分并指出问题：
1. 页面目标清晰度。
2. 信息架构。
3. 视觉层级。
4. 色彩系统。
5. 字体与排版。
6. 布局与间距。
7. 组件一致性。
8. 交互状态。
9. 响应式适配。
10. 可访问性。
11. 品牌个性。

请先列出最严重的 5 个问题，再给出具体修改建议，最后输出一段可用于继续迭代的提示词。
\`\`\`

## 15.2 快速改进

\`\`\`md
请不要重做整个页面，只基于当前结构进行 UI 迭代。
重点提升视觉层级、间距节奏、组件一致性、状态完整度和品牌个性。
请保留业务功能和页面模块。
输出优化后的界面，并说明你具体改了哪些 UI 细节。
\`\`\`

## 15.3 针对模板感

\`\`\`md
当前页面有模板感，请增强真实产品感和品牌个性。
不要增加无意义装饰。
请通过更具体的内容、更清晰的信息层级、更统一的组件、更有识别度的色彩/排版/图标来优化。
\`\`\`

## 15.4 针对移动端

\`\`\`md
请重点检查并优化移动端体验：
页面改为单列布局。
表格改为卡片列表或横向滚动。
导航改为底部导航或抽屉。
按钮触控区域足够大。
文本不能溢出、遮挡或挤压。
固定底部操作不能遮挡内容。
\`\`\`

## 15.5 针对状态缺失

\`\`\`md
请补全页面的真实使用状态：
加载状态、空状态、错误状态、成功反馈、禁用状态、悬停状态、聚焦状态、选中状态。
每个状态都需要有清晰视觉表现和合理文案。
\`\`\`

---

## 16. 最终交付前检查

- 页面目标清楚。
- 主操作突出。
- 信息架构合理。
- 视觉层级明确。
- 颜色有系统。
- 字体层级统一。
- 间距和对齐稳定。
- 组件来自同一套设计语言。
- 图标风格一致。
- 表单校验完整。
- 加载、空、错误、成功状态完整。
- 危险操作有确认。
- 响应式可用。
- 文本不溢出。
- 交互元素有 focus。
- 图标按钮有 tooltip 或可读名称。
- 页面有品牌记忆点。
- 没有无意义装饰。
- 看起来像真实产品，而不是静态概念图。
